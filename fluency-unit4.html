<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Problems — Fluency</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root{--bg:#F7F4EF;--surface:#FFFFFF;--border:#E2DDD6;--text-primary:#1A1714;--text-secondary:#6B6560;--text-muted:#9B9591;--accent:#2D6A4F;--accent-light:#EAF4EF;--accent-warm:#C17D3C;--accent-warm-light:#FBF0E4;--error:#C0392B;--radius:12px;--radius-lg:20px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
  .app{width:100%;max-width:820px;display:flex;flex-direction:column;gap:14px;}
  .header{display:flex;align-items:center;gap:12px;}
  .lesson-label{font-family:'DM Serif Display',serif;font-size:22px;letter-spacing:-0.5px;}
  .phase-label{font-size:12px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;flex:1;}

  /* Model / drill layout */
  .drill-layout{display:flex;gap:12px;align-items:flex-start;}
  .model-area{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 16px;overflow:visible;min-height:180px;}
  .right-col{display:flex;flex-direction:column;gap:10px;width:148px;flex-shrink:0;}

  /* Word bank */
  .word-bank{border:2px solid var(--text-primary);border-radius:var(--radius);padding:8px 7px;display:flex;flex-direction:column;gap:5px;background:var(--surface);}
  .wb-group{display:flex;flex-direction:column;gap:3px;}
  .wb-row{display:flex;gap:3px;}
  .wb-div{height:1px;background:var(--border);margin:3px 0;}
  .word-btn{width:100%;padding:6px 4px;border-radius:7px;border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--text-primary);cursor:pointer;transition:all 0.1s;text-align:center;}
  .word-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
  .word-btn:active{transform:scale(0.95);}
  .word-btn-half{flex:1;padding:6px 2px;border-radius:7px;border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;color:var(--text-primary);cursor:pointer;transition:all 0.1s;text-align:center;}
  .word-btn-half:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}

  /* Instruct word bank (used inside lesson-style wb-btn) */
  .instruct-word-bank{width:100%;border:2px solid var(--text-primary);border-radius:var(--radius);padding:10px;display:flex;flex-direction:column;gap:6px;background:var(--surface);}
  .wb-btn{padding:9px 14px;border-radius:7px;border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text-primary);cursor:pointer;transition:all 0.1s;text-align:left;line-height:1.3;}
  .wb-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
  .wb-btn:active{transform:scale(0.96);}

  /* Relation strip */
  .relation-strip{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;min-height:44px;}
  .token{background:var(--accent-light);border:1px solid #B8DAC8;border-radius:5px;padding:3px 9px;font-size:13px;font-weight:600;color:var(--accent);}
  .token.unk{background:#F0EAF8;border-color:#C9B8E8;color:#6C3483;}
  .strip-ph{font-size:13px;color:var(--text-muted);font-style:italic;}
  .strip-row{display:flex;gap:8px;margin-top:6px;}
  .btn-back{padding:7px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--text-secondary);cursor:pointer;}
  .btn-back:hover{border-color:var(--accent-warm);color:var(--accent-warm);}
  .btn-sub{padding:7px 16px;border-radius:var(--radius);border:none;background:var(--accent);color:white;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
  .btn-sub:hover{background:#255C43;}
  .btn-sub:disabled{opacity:0.35;pointer-events:none;}
  .btn-continue{width:100%;padding:13px;border-radius:var(--radius);border:none;background:var(--accent);color:white;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;}
  .btn-continue:hover{background:#255C43;}

  /* Timer */
  .timer-ring{position:relative;width:56px;height:56px;flex-shrink:0;}
  .timer-ring svg{transform:rotate(-90deg);}
  .timer-ring .bg{fill:none;stroke:var(--border);stroke-width:5;}
  .timer-ring .fg{fill:none;stroke:var(--accent);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke 0.3s;}
  .timer-ring .fg.urgent{stroke:var(--error);}
  .timer-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:17px;}

  /* Results */
  .results-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px 32px;text-align:center;}
  .results-card h2{font-family:'DM Serif Display',serif;font-size:24px;color:var(--accent);margin-bottom:16px;}
  .rate-row{display:flex;gap:20px;justify-content:center;margin-bottom:16px;}
  .rate-stat{text-align:center;}
  .rate-num{font-family:'DM Serif Display',serif;font-size:44px;}
  .rate-num.c{color:var(--accent);}
  .rate-num.e{color:var(--error);}
  .rate-sub{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
  .feedback-card{background:var(--accent-warm-light);border:1px solid #E8C99A;border-radius:var(--radius);padding:14px 18px;font-size:14px;line-height:1.6;margin-bottom:10px;}
  .feedback-card.ok{background:var(--accent-light);border-color:#B8DAC8;}
  .nav-links{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
  .nav-link{flex:1;padding:11px;border-radius:var(--radius);border:2px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--text-primary);text-decoration:none;text-align:center;display:block;}
  .nav-link:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
  .nav-link.primary{background:var(--accent);border-color:var(--accent);color:white;}

  /* Intro card */
  .intro-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px 32px;}
  .intro-card h2{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:10px;}
  .intro-card p{font-size:14px;line-height:1.6;color:var(--text-secondary);margin-bottom:6px;}
  .start-btn{width:100%;padding:14px;border-radius:var(--radius);border:none;background:var(--accent);color:white;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;cursor:pointer;margin-top:14px;}
  .start-btn:hover{background:#255C43;}

  /* Toolbar */
  .toolbar{display:flex;gap:6px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
  .btn-secondary{padding:6px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--text-secondary);cursor:pointer;}
  .btn-secondary:hover{border-color:var(--accent-warm);color:var(--accent-warm);}

  /* Problem text */
  .problem-text{background:var(--accent-light);border:1px solid #B8DAC8;border-radius:var(--radius);padding:10px 14px;font-size:13px;line-height:1.6;color:var(--text-primary);margin-bottom:10px;}

  @keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
  .fu{animation:fadeUp 0.2s ease;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="lesson-label">Word Problems — Fluency</span>
    <span class="phase-label" id="phaseLabel">Practice</span>
  </div>
  <div id="main"></div>
</div>
<script>
// ── Config ───────────────────────────────────────────────────────────────────
const CFG = {id:8, storageKey:'fluency_unit4_sessions', chartHref:'chart.html', lessonHref:'lesson-unit4.html'};

// ── Storage ──────────────────────────────────────────────────────────────────
function loadSessions(){try{const r=localStorage.getItem(CFG.storageKey);return r?JSON.parse(r):[];}catch(e){return[];}}
function saveSession(s){try{const e=loadSessions();e.push(s);localStorage.setItem(CFG.storageKey,JSON.stringify(e));}catch(e){}}

// ── Utilities ────────────────────────────────────────────────────────────────
const COLORS=[{name:'blue',hex:'#1B6CA8'},{name:'orange',hex:'#D4600A'},{name:'green',hex:'#2D6A4F'},{name:'red',hex:'#C0392B'},{name:'purple',hex:'#6C3483'}];
function tc(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(0.299*r+0.587*g+0.114*b)/255>0.55?'#1A1714':'#FFFFFF';}
function shuffle(a){const arr=[...a];for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
const FRAC_NAMES=['half','third','fourth','fifth'];
function fracName(n){return FRAC_NAMES[n-2]||`${n}th`;}
const BH=62, GAP=6, SNAP=10, CVW=420;

// ── Fluency problem pool ─────────────────────────────────────────────────────
const POOL = [
  {
    text: 'A jar holds green marbles and purple marbles. All the marbles together fill the jar.',
    type: 'pw', labels: ['jar','green marbles','purple marbles'],
    expectedBars: 3, proportions: [0.45, 0.55],
    correct: ['green marbles','plus','purple marbles','equals','jar'],
    ops: ['plus','minus','equals','unknown'],
  },
  {
    text: 'A board was split into a left section and a right section. The right section is smaller.',
    type: 'pw', labels: ['board','left section','right section'],
    expectedBars: 3, proportions: [0.7, 0.3],
    correct: ['board','minus','right section','equals','left section'],
    ops: ['plus','minus','equals','unknown'],
  },
  {
    text: "Sam's score is higher than Maya's score. The gap between them is the difference.",
    type: 'cmp', labels: ["Sam's score","Maya's score",'difference'],
    expectedBars: 3, proportions: [0.65, 0.35],
    correct: ["Sam's score",'minus',"Maya's score",'equals','difference'],
    ops: ['plus','minus','equals','unknown'],
  },
  {
    text: 'Two dogs weigh the same amount. Draw both dogs.',
    type: 'eq', labels: ['dog one','dog two'],
    expectedBars: 2, proportions: [1.0],
    correct: ['dog one','equals','dog two'],
    ops: ['equals','unknown'],
  },
  {
    text: 'One third of a garden is planted. Show the whole garden and one planted part.',
    type: 'frac', labels: ['garden','planted part'],
    expectedBars: 2, denominator: 3, proportions: [1/3],
    correct: ['one','third','of','garden','equals','planted part'],
    ops: ['one','half','third','fourth','of','equals','unknown'],
  },
  {
    text: 'A shelf holds red books and blue books. Together they fill the whole shelf.',
    type: 'pw', labels: ['shelf','red books','blue books'],
    expectedBars: 3, proportions: [0.6, 0.4],
    correct: ['red books','plus','blue books','equals','shelf'],
    ops: ['plus','minus','equals','unknown'],
  },
  {
    text: 'The tall building is taller than the short building. Show both and the height difference.',
    type: 'cmp', labels: ['tall building','short building','height difference'],
    expectedBars: 3, proportions: [0.7, 0.3],
    correct: ['tall building','minus','short building','equals','height difference'],
    ops: ['plus','minus','equals','unknown'],
  },
  {
    text: 'One quarter of the field is covered in snow. Draw the field split into four parts.',
    type: 'frac', labels: ['field','snow'],
    expectedBars: 2, denominator: 4, proportions: [1/4],
    correct: ['one','fourth','of','field','equals','snow'],
    ops: ['one','half','third','fourth','of','equals','unknown'],
  },
  {
    text: 'Tom read some pages yesterday and some pages today. Together they equal the whole chapter.',
    type: 'pw', labels: ['chapter','yesterday','today'],
    expectedBars: 3, proportions: [0.55, 0.45],
    correct: ['yesterday','plus','today','equals','chapter'],
    ops: ['plus','minus','equals','unknown'],
  },
  {
    text: 'The long ribbon is longer than the short ribbon. Show both and the difference.',
    type: 'cmp', labels: ['long ribbon','short ribbon','difference'],
    expectedBars: 3, proportions: [0.6, 0.4],
    correct: ['long ribbon','minus','short ribbon','equals','difference'],
    ops: ['plus','minus','equals','unknown'],
  },
  {
    text: 'Two boxes have the same number of crayons.',
    type: 'eq', labels: ['box A','box B'],
    expectedBars: 2, proportions: [1.0],
    correct: ['box A','equals','box B'],
    ops: ['equals','unknown'],
  },
  {
    text: 'One half of the pizza was eaten. Draw the whole pizza and the eaten half.',
    type: 'frac', labels: ['pizza','eaten part'],
    expectedBars: 2, denominator: 2, proportions: [0.5],
    correct: ['one','half','of','pizza','equals','eaten part'],
    ops: ['one','half','third','fourth','of','equals','unknown'],
  },
];

// ── Drag-and-Draw Canvas State ───────────────────────────────────────────────
let DC = {
  bars: [],
  drawing: false,
  drawStart: 0,
  ghostX: 0,
  ghostW: 0,
  draggingBarId: null,
  dragOffsetX: 0,
  colorIdx: 0,
  nextId: 0,
  labelPending: null,
};

function resetDC() {
  DC = { bars: [], drawing: false, drawStart: 0, ghostX: 0, ghostW: 0, draggingBarId: null, dragOffsetX: 0, colorIdx: 0, nextId: 0, labelPending: null };
}

// ── Canvas helpers ───────────────────────────────────────────────────────────
function snap(v){return Math.round(v/SNAP)*SNAP;}

function snapAligned(w,startX){
  const rEdge=startX+w;
  for(const b of DC.bars){
    if(Math.abs(rEdge-b.x)<8)return b.x-startX;
    if(Math.abs(rEdge-(b.x+b.w))<8)return(b.x+b.w)-startX;
  }
  return snap(w);
}

function canvasH(){return Math.max((DC.bars.length+(DC.drawing?1:0))*(BH+GAP)+8,140);}

function barDiv(b,i){
  const col=COLORS[b.colorIdx];
  const textColor=tc(col.hex);
  const y=i*(BH+GAP);
  const isSelected=b.id===DC.labelPending||b.selected;
  const border=isSelected?`3px solid ${col.hex}`:'none';
  const label=b.label
    ?`<span style="font-size:11px;font-weight:600;color:${textColor};text-transform:capitalize;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:${b.w-12}px">${b.label}</span>`
    :`<span style="font-size:11px;color:${textColor};opacity:0.6;font-style:italic">unlabeled</span>`;
  return`<div id="bar_${b.id}" data-barid="${b.id}" style="position:absolute;left:${b.x}px;top:${y}px;width:${b.w}px;height:${BH}px;background:${col.hex};border-radius:6px;border:${border};display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;box-sizing:border-box" onmousedown="dcBarDown(event,${b.id})" onclick="dcSelectBar(${b.id})">${label}</div>`;
}

function ghostDiv(){
  if(!DC.drawing||DC.ghostW<10)return'';
  const col=COLORS[DC.colorIdx];
  const y=DC.bars.length*(BH+GAP);
  return`<div style="position:absolute;left:${DC.ghostX}px;top:${y}px;width:${DC.ghostW}px;height:${BH}px;background:${col.hex};opacity:0.45;border-radius:6px;pointer-events:none"></div>`;
}

function guides(){
  if(!DC.drawing||DC.ghostW<10)return'';
  let html='';
  const gLeft=DC.ghostX,gRight=DC.ghostX+DC.ghostW;
  DC.bars.forEach((b,i)=>{
    const y=i*(BH+GAP);
    [b.x,b.x+b.w].forEach(edge=>{
      if(Math.abs(gLeft-edge)<8||Math.abs(gRight-edge)<8){
        html+=`<div style="position:absolute;left:${edge}px;top:0;bottom:-20px;border-left:2px dashed var(--accent);opacity:0.5;pointer-events:none"></div>`;
      }
    });
  });
  return html;
}

function dcHtml(){
  const barsHtml=DC.bars.map((b,i)=>barDiv(b,i)).join('');
  return`<div id="dcCanvas" style="position:relative;width:${CVW}px;height:${canvasH()}px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:visible;cursor:crosshair"
    onmousedown="dcDown(event)"
    onmousemove="dcMove(event)"
    onmouseup="dcUp(event)"
    onmouseleave="dcUp(event)"
  >${barsHtml}${ghostDiv()}${guides()}</div>`;
}

// ── Canvas event handlers ────────────────────────────────────────────────────
function dcDown(e){
  if(e.target.dataset.barid)return;
  const rect=document.getElementById('dcCanvas').getBoundingClientRect();
  const x=snap(e.clientX-rect.left);
  DC.drawing=true;DC.drawStart=x;DC.ghostX=x;DC.ghostW=0;
  redrawCanvas();
}

function dcMove(e){
  if(DC.draggingBarId!==null){
    const rect=document.getElementById('dcCanvas').getBoundingClientRect();
    let newX=snap(e.clientX-rect.left-DC.dragOffsetX);
    newX=Math.max(0,Math.min(newX,CVW-40));
    const b=DC.bars.find(b=>b.id===DC.draggingBarId);
    if(b)b.x=newX;
    redrawCanvas();return;
  }
  if(!DC.drawing)return;
  const rect=document.getElementById('dcCanvas').getBoundingClientRect();
  const x=snap(e.clientX-rect.left);
  const rawW=x-DC.drawStart;
  if(rawW>0){DC.ghostX=DC.drawStart;DC.ghostW=snapAligned(rawW,DC.drawStart);}
  else{DC.ghostX=snap(x);DC.ghostW=snap(DC.drawStart-x);}
  DC.ghostW=Math.max(0,Math.min(DC.ghostW,CVW-DC.ghostX));
  redrawCanvas();
}

function dcUp(e){
  if(DC.draggingBarId!==null){DC.draggingBarId=null;return;}
  if(!DC.drawing)return;
  DC.drawing=false;
  if(DC.ghostW>=40){
    const id=DC.nextId++;
    DC.bars.push({id,colorIdx:DC.colorIdx,x:DC.ghostX,w:DC.ghostW,label:'',selected:false});
    DC.labelPending=id;
  }
  DC.ghostW=0;
  redrawCanvas();
}

function dcBarDown(e,id){
  e.stopPropagation();
  const rect=document.getElementById('dcCanvas').getBoundingClientRect();
  const b=DC.bars.find(b=>b.id===id);
  if(!b)return;
  DC.draggingBarId=id;
  DC.dragOffsetX=e.clientX-rect.left-b.x;
}

function dcSelectBar(id){DC.labelPending=id;redrawCanvas();}

function dcUndo(){DC.bars.pop();DC.labelPending=null;redrawCanvas();}
function dcReset(){DC.bars=[];DC.labelPending=null;DC.nextId=0;redrawCanvas();}
function dcSetColor(idx){DC.colorIdx=idx;redrawCanvas();}

function dcAssignLabel(label){
  if(DC.labelPending!==null){
    const b=DC.bars.find(b=>b.id===DC.labelPending);
    if(b)b.label=label;
    DC.labelPending=null;
  }
  redrawCanvas();
}

function colorPalette(){
  return`<div style="display:flex;gap:6px;align-items:center">
    ${COLORS.map((c,i)=>`<div onclick="dcSetColor(${i})" style="width:24px;height:24px;border-radius:50%;background:${c.hex};cursor:pointer;outline:${i===DC.colorIdx?'3px solid var(--text-primary)':'2px solid transparent'};outline-offset:2px;transition:outline 0.1s"></div>`).join('')}
    <span style="font-size:10px;color:var(--text-muted);margin-left:2px">Color</span>
  </div>`;
}

function labelPanel(labels){
  if(DC.labelPending===null)return'';
  const usedLabels=new Set(DC.bars.filter(b=>b.id!==DC.labelPending&&b.label).map(b=>b.label));
  const available=labels.filter(l=>!usedLabels.has(l));
  if(available.length===0)return'';
  return`<div style="margin-top:6px;padding:8px 10px;background:var(--accent-light);border:1px solid #B8DAC8;border-radius:var(--radius)">
    <div style="font-size:10px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:5px">Assign label</div>
    <div style="display:flex;flex-wrap:wrap;gap:4px">
      ${available.map(l=>`<button onclick="dcAssignLabel('${l.replace(/'/g,"\\'")}')` +
        `" style="padding:5px 10px;border-radius:var(--radius);border:1px solid var(--accent);background:white;color:var(--accent);font-size:12px;font-weight:600;cursor:pointer">${l}</button>`).join('')}
    </div>
  </div>`;
}

// ── Redraw only the canvas area ──────────────────────────────────────────────
function redrawCanvas(){
  const container=document.getElementById('canvasContainer');
  if(!container)return;
  const p=S.item;
  const doneDisabled=DC.bars.length<2?'disabled':'';
  container.innerHTML=`
    <div class="toolbar">
      ${colorPalette()}
      <button class="btn-secondary" onclick="dcUndo()">Undo</button>
      <button class="btn-secondary" onclick="dcReset()">Reset</button>
    </div>
    ${dcHtml()}
    ${p?labelPanel(p.labels):''}
    <button class="btn-sub" style="margin-top:8px;width:100%" onclick="submitDraw()" ${doneDisabled}>Done Drawing →</button>
  `;
}

// ── Model check (fluency — bar count + rough proportions, no label requirement) ──
function checkModelFluency(problem){
  if(DC.bars.length!==problem.expectedBars){
    return{ok:false,fb:`Need ${problem.expectedBars} bars.`};
  }
  if(problem.type==='pw'||problem.type==='cmp'){
    const sorted=[...DC.bars].sort((a,b)=>b.w-a.w);
    const totalW=sorted[0].w;
    const partBars=sorted.slice(1);
    const partWidths=partBars.map(b=>b.w/totalW);
    const sortedParts=[...partWidths].sort((a,b)=>b-a);
    const sortedExp=[...problem.proportions].sort((a,b)=>b-a);
    for(let i=0;i<Math.min(sortedParts.length,sortedExp.length);i++){
      if(Math.abs(sortedParts[i]-sortedExp[i])>0.35){
        return{ok:false,fb:`Bar sizes don't match the problem. Adjust proportions.`};
      }
    }
    const partSum=partWidths.reduce((a,b)=>a+b,0);
    if(Math.abs(partSum-1.0)>0.30){
      return{ok:false,fb:`Parts should together match the whole bar width.`};
    }
  }
  return{ok:true,fb:null};
}

// ── Relation strip ───────────────────────────────────────────────────────────
let assembled=[];

function addT(w){assembled.push(w);drawNamePhase();}
function back(){assembled.pop();drawNamePhase();}

function wbHtml(item){
  const opBtns=item.ops.map(o=>`<button class="word-btn" onclick="addT('${o}')">${o}</button>`).join('');
  const labelBtns=item.labels.map(l=>`<button class="word-btn" onclick="addT('${l.replace(/'/g,"\\'")}')">` +
    `${l}</button>`).join('');
  return`<div class="word-bank">
    <div class="wb-group">${labelBtns}</div>
    <div class="wb-div"></div>
    <div class="wb-group">${opBtns}</div>
  </div>`;
}

function stripHtml(){
  const toks=assembled.length
    ?assembled.map(t=>`<span class="token${t==='unknown'?' unk':''}">${t}</span>`).join('')
    :`<span class="strip-ph">Build the relation...</span>`;
  return`<div class="relation-strip">${toks}</div>
    <div class="strip-row">
      <button class="btn-back" onclick="back()">← Back</button>
      <button class="btn-sub" onclick="sub()" ${assembled.length<2?'disabled':''}>Submit</button>
    </div>`;
}

function check(tokens,item){
  const s=tokens.join(' ');
  const cor=item.correct.join(' ');
  if(s===cor)return{ok:true,fb:null};
  const hasAll=item.correct.every(t=>tokens.includes(t));
  if(hasAll)return{ok:false,fb:`Almost — check the order. Try: ${cor}`};
  return{ok:false,fb:`Try: ${cor}`};
}

// ── Timer ────────────────────────────────────────────────────────────────────
const DUR=60, CIRC=2*Math.PI*24;
function tRing(t){
  const off=CIRC*(1-t/DUR);
  return`<div class="timer-ring"><svg width="56" height="56" viewBox="0 0 56 56"><circle class="bg" cx="28" cy="28" r="24"/><circle class="fg${t<=12?' urgent':''}" cx="28" cy="28" r="24" stroke-dasharray="${CIRC.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/></svg><div class="timer-label">${t}</div></div>`;
}

// ── State ────────────────────────────────────────────────────────────────────
const S={phase:'intro',t:DUR,timer:null,cor:0,err:0,item:null,drawnOk:false,start:null,errors:[],ci:0,cItem:null,cAsm:[],cFb:null,drillPhase:'draw'};
function render(h){document.getElementById('main').innerHTML=h;}
function setPhase(l){document.getElementById('phaseLabel').textContent=l;}

// ── Generate item from pool ──────────────────────────────────────────────────
function genItem(){return POOL[Math.floor(Math.random()*POOL.length)];}

// ── Drill ────────────────────────────────────────────────────────────────────
function showIntro(){
  S.phase='intro';setPhase('Practice');
  render(`<div class="intro-card fu">
    <h2>Word Problems — Fluency</h2>
    <p>You will see word problems for <strong>60 seconds</strong>.</p>
    <p>For each problem: draw a bar model, then name the relation using the word bank.</p>
    <p>Labels are optional during fluency — focus on bar count and proportions.</p>
    <p style="color:var(--accent);font-weight:600">Go as fast as you accurately can.</p>
    <button class="start-btn" onclick="startDrill()">Start</button>
  </div>`);
}

function startDrill(){
  S.phase='drill';S.cor=0;S.err=0;S.t=DUR;S.start=new Date().toISOString();S.errors=[];
  setPhase('Practice');
  nextItem();
  S.timer=setInterval(()=>{S.t--;updateT();if(S.t<=0)endDrill();},1000);
}

function nextItem(){
  S.item=genItem();
  S.drillPhase='draw';
  resetDC();
  assembled=[];
  S.drawnOk=false;
  drawDrawPhase();
}

function drawDrawPhase(){
  const p=S.item;
  const doneDisabled=DC.bars.length<2?'disabled':'';
  render(`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">${tRing(S.t)}</div>
    <div class="fu">
      <div class="problem-text">${p.text}</div>
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px">Labels: ${p.labels.join(', ')}</div>
      <div id="canvasContainer">
        <div class="toolbar">
          ${colorPalette()}
          <button class="btn-secondary" onclick="dcUndo()">Undo</button>
          <button class="btn-secondary" onclick="dcReset()">Reset</button>
        </div>
        ${dcHtml()}
        ${labelPanel(p.labels)}
        <button class="btn-sub" style="margin-top:8px;width:100%" onclick="submitDraw()" ${doneDisabled}>Done Drawing →</button>
      </div>
      <div id="drawFeedback"></div>
    </div>`);
}

function drawNamePhase(){
  const p=S.item;
  const container=document.getElementById('nameContainer');
  if(!container)return;
  container.innerHTML=wbHtml(p)+stripHtml();
}

function submitDraw(){
  if(S.phase!=='drill')return;
  const p=S.item;
  const result=checkModelFluency(p);
  if(!result.ok){
    const fb=document.getElementById('drawFeedback');
    if(fb)fb.innerHTML=`<div style="margin-top:6px;padding:8px 12px;background:var(--accent-warm-light);border:1px solid #E8C99A;border-radius:var(--radius);font-size:13px;color:#7A4A1E">${result.fb}</div>`;
    return;
  }
  S.drawnOk=true;
  S.drillPhase='name';
  assembled=[];
  render(`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">${tRing(S.t)}</div>
    <div class="fu">
      <div class="problem-text">${p.text}</div>
      <div class="drill-layout">
        <div class="model-area">${snapshotModel()}</div>
        <div id="nameContainer">${wbHtml(p)}${stripHtml()}</div>
      </div>
    </div>`);
}

function snapshotModel(){
  const h=Math.max(DC.bars.length*(BH+GAP)+8,80);
  const barsHtml=DC.bars.map((b,i)=>{
    const col=COLORS[b.colorIdx];
    const y=i*(BH+GAP);
    const textColor=tc(col.hex);
    const lbl=b.label||'';
    return`<div style="position:absolute;left:${b.x}px;top:${y}px;width:${b.w}px;height:${BH}px;background:${col.hex};border-radius:6px;display:flex;align-items:center;justify-content:center">
      <span style="font-size:10px;font-weight:600;color:${textColor};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:${b.w-10}px">${lbl}</span>
    </div>`;
  }).join('');
  return`<div style="position:relative;width:100%;height:${h}px;overflow:hidden">${barsHtml}</div>`;
}

function sub(){
  if(S.phase!=='drill')return;
  const{ok,fb}=check(assembled,S.item);
  if(ok){S.cor++;}else{S.err++;S.errors.push({item:S.item,fb});}
  nextItem();
}

function updateT(){
  const r=document.querySelector('.timer-ring');
  if(!r)return;
  const off=CIRC*(1-S.t/DUR);
  const fg=r.querySelector('.fg');
  const lb=r.querySelector('.timer-label');
  if(fg){fg.setAttribute('stroke-dashoffset',off.toFixed(1));if(S.t<=12)fg.classList.add('urgent');}
  if(lb)lb.textContent=S.t;
}

function endDrill(){
  clearInterval(S.timer);S.phase='results';setPhase('Results');
  const cpm=Math.round(S.cor*(60/DUR)*2)/2;
  const epm=Math.round(S.err*(60/DUR)*2)/2;
  saveSession({date:S.start,lesson:CFG.id,phase:'fluency',corrects:S.cor,errors:S.err,cpm,epm,duration:DUR});
  render(`<div class="results-card fu"><h2>Session Complete</h2>
    <div class="rate-row">
      <div class="rate-stat"><div class="rate-num c">${S.cor}</div><div class="rate-sub">Correct</div></div>
      <div style="font-size:26px;color:var(--text-muted);padding-top:10px">/</div>
      <div class="rate-stat"><div class="rate-num e">${S.err}</div><div class="rate-sub">Errors</div></div>
    </div>
    <p style="color:var(--text-secondary);font-size:14px;margin-bottom:${S.errors.length?'16px':'0'}">${S.cor} correct and ${S.err} error${S.err!==1?'s':''} in 60 seconds.</p>
    ${S.errors.length
      ?`<button class="btn-continue" onclick="startCorrections()">Review ${S.errors.length} missed item${S.errors.length!==1?'s':''} →</button>`
      :`<div class="nav-links"><a class="nav-link" href="${CFG.lessonHref}">Back to Lesson</a><a class="nav-link primary" href="${CFG.chartHref}">View Chart</a><a class="nav-link" onclick="location.reload()">Again</a></div>`}
  </div>`);
}

// ── Corrections ──────────────────────────────────────────────────────────────
function startCorrections(){S.phase='correction';S.ci=0;setPhase('Review');showC();}

function showC(){
  if(S.ci>=S.errors.length){doneC();return;}
  const e=S.errors[S.ci];S.cItem=e.item;S.cAsm=[];S.cFb=e.fb;
  drawC();
}

function drawC(){
  render(`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <span style="font-size:13px;font-weight:600;color:var(--text-secondary)">Missed item ${S.ci+1} of ${S.errors.length}</span>
    <span style="font-size:12px;color:var(--text-muted)">${S.errors.length-S.ci} remaining</span>
  </div>
  <div class="feedback-card">${S.cFb}</div>
  <div class="problem-text">${S.cItem.text}</div>
  <div class="drill-layout fu">
    <div class="model-area" style="min-height:80px">
      <div style="font-size:12px;color:var(--text-muted);font-style:italic">Review the relation below</div>
      <div style="margin-top:8px;font-size:13px;color:var(--accent);font-weight:600">${S.cItem.correct.join(' ')}</div>
    </div>
    <div>
      ${wbCHtml()}
      ${stripCHtml()}
    </div>
  </div>`);
}

function wbCHtml(){
  const item=S.cItem;
  const opBtns=item.ops.map(o=>`<button class="word-btn" onclick="addC('${o}')">${o}</button>`).join('');
  const labelBtns=item.labels.map(l=>`<button class="word-btn" onclick="addC('${l.replace(/'/g,"\\'")}')">` +
    `${l}</button>`).join('');
  return`<div class="word-bank">
    <div class="wb-group">${labelBtns}</div>
    <div class="wb-div"></div>
    <div class="wb-group">${opBtns}</div>
  </div>`;
}

function stripCHtml(){
  const toks=S.cAsm.length
    ?S.cAsm.map(t=>`<span class="token${t==='unknown'?' unk':''}">${t}</span>`).join('')
    :`<span class="strip-ph">Build the relation...</span>`;
  return`<div class="relation-strip" style="margin-top:6px">${toks}</div>
    <div class="strip-row">
      <button class="btn-back" onclick="backC()">← Back</button>
      <button class="btn-sub" onclick="subC()" ${S.cAsm.length<2?'disabled':''}>Submit</button>
    </div>`;
}

function addC(w){S.cAsm.push(w);drawC();}
function backC(){S.cAsm.pop();drawC();}

function subC(){
  const{ok,fb}=check(S.cAsm,S.cItem);
  if(ok){
    const rem=S.errors.length-S.ci-1;
    render(`<div class="feedback-card ok fu">Correct — ${S.cItem.correct.join(' ')}</div>
      <div class="problem-text">${S.cItem.text}</div>
      <button class="btn-continue" style="margin-top:10px" onclick="nextC()">${rem>0?'Next missed item →':'Finish review'}</button>`);
  }else{
    S.cFb=fb;S.cAsm=[];drawC();
  }
}

function nextC(){S.ci++;showC();}
function doneC(){
  setPhase('Complete');
  render(`<div class="results-card fu"><h2>Review Complete</h2>
    <p style="color:var(--text-secondary);font-size:14px;margin-bottom:16px">You worked through all ${S.errors.length} missed item${S.errors.length!==1?'s':''}.</p>
    <div class="nav-links">
      <a class="nav-link" onclick="location.reload()">Practice Again</a>
      <a class="nav-link primary" href="${CFG.chartHref}">View Chart</a>
      <a class="nav-link" href="${CFG.lessonHref}">Back to Lesson</a>
    </div>
  </div>`);
}

showIntro();
</script>
</body>
</html>
