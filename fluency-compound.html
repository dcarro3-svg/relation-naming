<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluency — Compound Relations</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root{--bg:#F7F4EF;--surface:#FFFFFF;--border:#E2DDD6;--text-primary:#1A1714;--text-secondary:#6B6560;--text-muted:#9B9591;--accent:#2D6A4F;--accent-light:#EAF4EF;--accent-warm:#C17D3C;--accent-warm-light:#FBF0E4;--error:#C0392B;--radius:12px;--radius-lg:20px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
  .app{width:100%;max-width:820px;display:flex;flex-direction:column;gap:14px;}
  .header{display:flex;align-items:center;gap:12px;}
  .lesson-label{font-family:'DM Serif Display',serif;font-size:22px;letter-spacing:-0.5px;}
  .phase-label{font-size:12px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;flex:1;}

  /* Layout: model area + word bank side by side */
  .drill-layout{display:flex;gap:12px;align-items:flex-start;}
  .model-area{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px 20px;overflow:visible;min-height:200px;}
  .right-col{display:flex;flex-direction:column;gap:10px;width:136px;flex-shrink:0;}

  /* Word bank */
  .word-bank{border:2px solid var(--text-primary);border-radius:var(--radius);padding:8px 7px;display:flex;flex-direction:column;gap:5px;background:var(--surface);}
  .wb-group{display:flex;flex-direction:column;gap:3px;}
  .wb-row{display:flex;gap:3px;}
  .wb-div{height:1px;background:var(--border);margin:3px 0;}
  .word-btn{width:100%;padding:6px 4px;border-radius:7px;border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--text-primary);cursor:pointer;transition:all 0.1s;text-align:center;}
  .word-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
  .word-btn:active{transform:scale(0.95);}
  .word-btn-half{flex:1;padding:6px 2px;border-radius:7px;border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;color:var(--text-primary);cursor:pointer;transition:all 0.1s;text-align:center;}
  .word-btn-half:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}

  /* Relation strip */
  .relation-strip{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;min-height:44px;}
  .token{background:var(--accent-light);border:1px solid #B8DAC8;border-radius:5px;padding:3px 9px;font-size:13px;font-weight:600;color:var(--accent);}
  .token.unk{background:#F0EAF8;border-color:#C9B8E8;color:#6C3483;}
  .strip-ph{font-size:13px;color:var(--text-muted);font-style:italic;}
  .strip-row{display:flex;gap:8px;margin-top:6px;}
  .btn-back{padding:7px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--text-secondary);cursor:pointer;}
  .btn-back:hover{border-color:var(--accent-warm);color:var(--accent-warm);}
  .btn-sub{padding:7px 16px;border-radius:var(--radius);border:none;background:var(--accent);color:white;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
  .btn-sub:hover{background:#255C43;}
  .btn-sub:disabled{opacity:0.35;pointer-events:none;}

  /* Phase label in model area */
  .phase-tag{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:10px;}
  .phase-tag.active{color:var(--accent);}

  /* Timer */
  .timer-ring{position:relative;width:56px;height:56px;flex-shrink:0;}
  .timer-ring svg{transform:rotate(-90deg);}
  .timer-ring .bg{fill:none;stroke:var(--border);stroke-width:5;}
  .timer-ring .fg{fill:none;stroke:var(--accent);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke 0.3s;}
  .timer-ring .fg.urgent{stroke:var(--error);}
  .timer-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:17px;}

  /* Results */
  .results-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px 32px;text-align:center;}
  .results-card h2{font-family:'DM Serif Display',serif;font-size:24px;color:var(--accent);margin-bottom:16px;}
  .rate-row{display:flex;gap:20px;justify-content:center;margin-bottom:16px;}
  .rate-stat{text-align:center;}
  .rate-num{font-family:'DM Serif Display',serif;font-size:44px;}
  .rate-num.c{color:var(--accent);}
  .rate-num.e{color:var(--error);}
  .rate-sub{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
  .feedback-card{background:var(--accent-warm-light);border:1px solid #E8C99A;border-radius:var(--radius);padding:14px 18px;font-size:14px;line-height:1.6;margin-bottom:10px;}
  .feedback-card.ok{background:var(--accent-light);border-color:#B8DAC8;}
  .btn-continue{width:100%;padding:13px;border-radius:var(--radius);border:none;background:var(--accent);color:white;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;}
  .btn-continue:hover{background:#255C43;}
  .nav-links{display:flex;gap:8px;margin-top:8px;}
  .nav-link{flex:1;padding:11px;border-radius:var(--radius);border:2px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--text-primary);text-decoration:none;text-align:center;display:block;}
  .nav-link:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
  .nav-link.primary{background:var(--accent);border-color:var(--accent);color:white;}
  .intro-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px 32px;}
  .intro-card h2{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:10px;}
  .intro-card p{font-size:14px;line-height:1.6;color:var(--text-secondary);margin-bottom:6px;}
  .start-btn{width:100%;padding:14px;border-radius:var(--radius);border:none;background:var(--accent);color:white;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;cursor:pointer;margin-top:14px;}
  .start-btn:hover{background:#255C43;}
  .bar-h{height:58px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

  /* Bridge pop animation */
  @keyframes popIn{0%{transform:scale(0.8);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
  .bridge-pop{animation:popIn 0.35s ease forwards;}

  @keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
  .fu{animation:fadeUp 0.2s ease;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="lesson-label">Compound Relations — Fluency</span>
    <span class="phase-label" id="phaseLabel">Practice</span>
  </div>
  <div id="main"></div>
</div>
<script>
// ── Config ────────────────────────────────────────────────────────────────────
const CFG={id:6,storageKey:'fluency_compound_sessions',chartHref:'chart.html',lessonHref:'lesson-compound.html'};

// ── Storage ───────────────────────────────────────────────────────────────────
function loadSessions(){try{const r=localStorage.getItem(CFG.storageKey);return r?JSON.parse(r):[];}catch(e){return[];}}
function saveSession(s){try{const e=loadSessions();e.push(s);localStorage.setItem(CFG.storageKey,JSON.stringify(e));}catch(e){}}

// ── Colors ────────────────────────────────────────────────────────────────────
const COLORS=[{name:'blue',hex:'#1B6CA8'},{name:'orange',hex:'#D4600A'},{name:'green',hex:'#2D6A4F'},{name:'red',hex:'#C0392B'},{name:'purple',hex:'#6C3483'},{name:'teal',hex:'#0E7E7E'},{name:'pink',hex:'#B03A6E'},{name:'navy',hex:'#1A3A5C'}];
const CF={blue:['blue','navy','teal'],navy:['navy','blue'],teal:['teal','blue','green'],green:['green','teal'],red:['red','pink'],pink:['pink','red'],orange:['orange'],purple:['purple']};
function fam(n){const f=CF[n]||[n];return COLORS.filter(c=>f.includes(c.name)||(CF[c.name]||[c.name]).includes(n)).map(c=>c.name);}
function randColor(ex=[]){const ef=ex.flatMap(n=>fam(n));const pool=COLORS.filter(c=>!ef.includes(c.name));return pool.length?pool[Math.floor(Math.random()*pool.length)]:COLORS.filter(c=>!ex.includes(c.name))[0];}
function tc(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(0.299*r+0.587*g+0.114*b)/255>0.55?'#1A1714':'#FFFFFF';}
function shuffle(a){const arr=[...a];for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
const BH=55,BASE=260;
const FRAC_NAMES=['half','third','fourth','fifth'];
const FRAC_DENOMS=[2,3,4,5];
function fracName(n){return FRAC_NAMES[n-2]||`${n}th`;}
const NUM_WORDS=['two','three','four','five'];
function numWord(n){return NUM_WORDS[n-2]||String(n);}

// ── Bar renderer ──────────────────────────────────────────────────────────────
function sbar(hex,name,w,isUnk=false,pale=false){
  const bg=pale?hex+'44':hex;const bdr=pale?'2px dashed #9B9591':'none';
  const col=pale?'#9B9591':tc(hex);
  const c=isUnk?`<span style="font-family:'DM Serif Display',serif;font-size:19px;font-style:italic;color:${col}">?</span>`:`<span style="font-size:10px;font-weight:600;text-transform:capitalize;color:${col}">${name}</span>`;
  return`<div class="bar-h" style="width:${w}px;background:${bg};border:${bdr}">${c}</div>`;
}

// ── Relation generators ────────────────────────────────────────────────────────
function genSimpleRelation(usedColors=[]){
  const types=['partwhole','fractional','multiplicative'];
  const type=types[Math.floor(Math.random()*types.length)];
  if(type==='partwhole'){
    const wC=randColor(usedColors),p1C=randColor([...usedColors,wC.name]),p2C=randColor([...usedColors,wC.name,p1C.name]);
    const tw=BASE*(0.6+Math.random()*0.25),sp=0.35+Math.random()*0.3;
    const roles=['whole','p1','p2'];
    const role=roles[Math.floor(Math.random()*roles.length)];
    const whole={color:wC,w:tw},p1={color:p1C,w:tw*sp},p2={color:p2C,w:tw*(1-sp)};
    let correct;
    if(role==='whole') correct=[p1C.name,'plus',p2C.name,'equals','unknown'];
    else if(role==='p1') correct=[wC.name,'minus',p2C.name,'equals','unknown'];
    else correct=[wC.name,'minus',p1C.name,'equals','unknown'];
    return{type,whole,p1,p2,unknownRole:role,colors:[wC,p1C,p2C],unknownColor:role==='whole'?wC:role==='p1'?p1C:p2C,correct};
  }
  const wC=randColor(usedColors),pC=randColor([...usedColors,wC.name]);
  const d=FRAC_DENOMS[Math.floor(Math.random()*FRAC_DENOMS.length)];
  const fi=Math.floor(Math.random()*d),wW=BASE*(0.7+Math.random()*0.2);
  const role=type==='fractional'?'part':(Math.random()>0.5?'whole':'part');
  let correct;
  if(type==='fractional') correct=['one',fracName(d),'of',wC.name,'equals','unknown'];
  else if(role==='whole') correct=[numWord(d),'times',pC.name,'equals','unknown'];
  else correct=['one',fracName(d),'of',wC.name,'equals','unknown'];
  return{type,wholeColor:wC,partColor:pC,denominator:d,filledIndex:fi,unknownRole:role,wholeW:wW,colors:[wC,pC],unknownColor:role==='part'?pC:wC,correct};
}

function injectBridge(rel,bridgeColor){
  if(rel.type==='partwhole'){
    rel.p1.color=bridgeColor;
    const{whole,p1,p2,unknownRole}=rel;
    if(unknownRole==='whole') rel.correct=[p1.color.name,'plus',p2.color.name,'equals','unknown'];
    else if(unknownRole==='p1') rel.correct=[whole.color.name,'minus',p2.color.name,'equals','unknown'];
    else rel.correct=[whole.color.name,'minus',p1.color.name,'equals','unknown'];
    rel.colors=[whole.color,p1.color,p2.color];
  } else {
    if(rel.unknownRole==='part'){
      rel.wholeColor=bridgeColor;
      if(rel.type==='fractional') rel.correct=['one',fracName(rel.denominator),'of',bridgeColor.name,'equals','unknown'];
      else rel.correct=[numWord(rel.denominator),'times',rel.partColor.name,'equals','unknown'];
    } else {
      rel.partColor=bridgeColor;
      if(rel.type==='fractional') rel.correct=['one',fracName(rel.denominator),'of',rel.wholeColor.name,'equals','unknown'];
      else rel.correct=[numWord(rel.denominator),'times',bridgeColor.name,'equals','unknown'];
    }
    rel.colors=[rel.wholeColor,rel.partColor];
  }
}

function genCompound(){
  const relA=genSimpleRelation([]);
  const bridgeColor=relA.unknownColor;
  const relB=genSimpleRelation([bridgeColor.name]);
  injectBridge(relB,bridgeColor);
  const solvableOnTop=Math.random()>0.5;
  return{relA,relB,bridgeColor,solvableOnTop,phase:1};
}

function allColors(item){
  const cols={};
  [...item.relA.colors,...item.relB.colors].forEach(c=>{cols[c.name]=c;});
  return Object.values(cols);
}

// ── Renderers ─────────────────────────────────────────────────────────────────
function renderRel(rel,opts={}){
  const{pale=false,bridgeFilled=false,bridgeColor=null}=opts;
  const op=pale?'opacity:0.35;':'';

  if(rel.type==='partwhole'){
    const{whole,p1,p2,unknownRole}=rel;
    const wB=sbar(whole.color.hex,whole.color.name,whole.w,unknownRole==='whole');
    const p1IsUnk=unknownRole==='p1'&&!bridgeFilled;
    const p2Unk=unknownRole==='p2';
    const p1B=sbar(p1.color.hex,p1.color.name,p1.w,p1IsUnk);
    const p2B=sbar(p2.color.hex,p2.color.name,p2.w,p2Unk);
    const lines=`<div style="position:absolute;left:0;top:0;bottom:0;border-left:2px dashed #9B9591"></div><div style="position:absolute;right:0;top:0;bottom:0;border-right:2px dashed #9B9591"></div>`;
    return`<div style="${op}position:relative;display:inline-block">${lines}<div style="display:flex;flex-direction:column;align-items:flex-start;gap:6px">${wB}<div style="display:flex">${p1B}${p2B}</div></div></div>`;
  }

  const{wholeColor,partColor,denominator,filledIndex,unknownRole,wholeW}=rel;
  const boxW=wholeW/denominator;
  const wUnk=unknownRole==='whole'&&!bridgeFilled;
  const wBar=sbar(wholeColor.hex,wholeColor.name,wholeW,wUnk);
  let boxes='';
  for(let i=0;i<denominator;i++){
    const iF=i===filledIndex,isUnk=iF&&unknownRole==='part'&&!bridgeFilled;
    const bg=iF?partColor.hex:partColor.hex+'33',bdr=iF?'none':'2px dashed #9B9591',col=iF?tc(partColor.hex):'#9B9591';
    const c=isUnk?`<span style="font-family:'DM Serif Display',serif;font-size:18px;font-style:italic;color:${col}">?</span>`:iF?`<span style="font-size:10px;font-weight:600;text-transform:capitalize;color:${col}">${partColor.name}</span>`:' ';
    boxes+=`<div style="width:${boxW}px;height:${BH}px;background:${bg};border:${bdr};${i===0?'border-radius:6px 0 0 6px':''}${i===denominator-1?'border-radius:0 6px 6px 0':''}display:flex;align-items:center;justify-content:center;flex-shrink:0">${c}</div>`;
  }
  let lines='';
  for(let i=1;i<denominator;i++) lines+=`<div style="position:absolute;left:${i*boxW}px;top:0;bottom:0;border-left:2px dashed #9B9591;pointer-events:none"></div>`;
  lines+=`<div style="position:absolute;left:0;top:0;bottom:0;border-left:2px dashed #9B9591;pointer-events:none"></div>`;
  lines+=`<div style="position:absolute;left:${wholeW}px;top:0;bottom:0;border-left:2px dashed #9B9591;pointer-events:none"></div>`;
  return`<div style="${op}position:relative;display:inline-block">${lines}<div style="display:flex;flex-direction:column;align-items:flex-start;gap:6px">${wBar}<div style="display:flex">${boxes}</div></div></div>`;
}

function renderCompound(item,phase1Solved=false){
  const{relA,relB,bridgeColor,solvableOnTop}=item;
  const topRel=solvableOnTop?relA:relB;
  const botRel=solvableOnTop?relB:relA;
  const topPale=!phase1Solved&&!solvableOnTop;
  const botPale=!phase1Solved&&solvableOnTop;
  const topHtml=renderRel(topRel,{pale:topPale,bridgeFilled:phase1Solved,bridgeColor});
  const botHtml=renderRel(botRel,{pale:botPale,bridgeFilled:phase1Solved,bridgeColor});
  const strip=`<div style="width:4px;border-radius:2px;background:${bridgeColor.hex};align-self:stretch;flex-shrink:0;margin-right:8px"></div>`;
  return`<div style="display:flex;gap:0;align-items:stretch">
    ${strip}
    <div style="display:flex;flex-direction:column;gap:12px;flex:1">
      <div id="fTop">${topHtml}</div>
      <div style="height:1px;background:#E2DDD6"></div>
      <div id="fBot">${botHtml}</div>
    </div>
  </div>`;
}

// ── Word bank ─────────────────────────────────────────────────────────────────
function wb(colors,fn){
  const cb=colors.map(c=>`<button class="word-btn" onclick="${fn}('${c.name}')">${c.name}</button>`).join('');
  return`<div class="word-bank">
    <div class="wb-group">${cb}</div>
    <div class="wb-div"></div>
    <div class="wb-group">
      <div class="wb-row">
        <button class="word-btn" style="flex:1" onclick="${fn}('one')">one</button>
        <button class="word-btn" style="flex:1" onclick="${fn}('half')">half</button>
        <button class="word-btn" style="flex:1" onclick="${fn}('third')">third</button>
        <button class="word-btn" style="flex:1" onclick="${fn}('fourth')">fourth</button>
      </div>
      <div class="wb-row">
        <button class="word-btn" style="flex:1" onclick="${fn}('fifth')">fifth</button>
        <button class="word-btn" style="flex:1" onclick="${fn}('two')">two</button>
        <button class="word-btn" style="flex:1" onclick="${fn}('three')">three</button>
        <button class="word-btn" style="flex:1" onclick="${fn}('four')">four</button>
      </div>
      <div class="wb-row">
        <button class="word-btn" style="flex:1" onclick="${fn}('five')">five</button>
        <button class="word-btn" style="flex:1" onclick="${fn}('times')">times</button>
        <button class="word-btn-half" onclick="${fn}('is')">is</button>
        <button class="word-btn-half" onclick="${fn}('of')">of</button>
      </div>
      <button class="word-btn" onclick="${fn}('plus')">plus</button>
      <button class="word-btn" onclick="${fn}('minus')">minus</button>
    </div>
    <div class="wb-div"></div>
    <div class="wb-group">
      <div class="wb-row">
        <button class="word-btn" onclick="${fn}('equals')">equals</button>
        <button class="word-btn" onclick="${fn}('unknown')">unknown</button>
      </div>
    </div>
  </div>`;
}

// ── Strip ─────────────────────────────────────────────────────────────────────
function strip(asm,subFn,backFn){
  const toks=asm.length?asm.map(t=>`<span class="token${t==='unknown'?' unk':''}">${t}</span>`).join(''):`<span class="strip-ph">Build the relation...</span>`;
  return`<div class="relation-strip">${toks}</div>
    <div class="strip-row">
      <button class="btn-back" onclick="${backFn}()">← Back</button>
      <button class="btn-sub" onclick="${subFn}()" ${asm.length<2?'disabled':''}>Submit</button>
    </div>`;
}

// ── Check ─────────────────────────────────────────────────────────────────────
function check(tokens,rel){
  const s=tokens.join(' '),cor=rel.correct.join(' ');
  if(s===cor) return{ok:true,fb:null};
  const qi=tokens.indexOf('unknown');
  if(qi>=0&&qi<tokens.length-1) return{ok:false,fb:`Put the unknown at the end — that is what you are solving for.`};
  if(rel.type==='partwhole'){
    const hasPlus=tokens.includes('plus'),hasMinus=tokens.includes('minus');
    if(rel.unknownRole==='whole'&&hasMinus) return{ok:false,fb:`The unknown is the whole — add the parts. Use plus.`};
    if(rel.unknownRole!=='whole'&&hasPlus) return{ok:false,fb:`The unknown is a part — subtract from the whole. Use minus.`};
  }
  if(rel.type==='fractional'||rel.type==='multiplicative'){
    const hasTimes=tokens.includes('times'),hasFrac=FRAC_NAMES.some(f=>tokens.includes(f));
    if(rel.unknownRole==='whole'&&hasFrac&&!hasTimes) return{ok:false,fb:`The unknown is the whole — use times.`};
    if(rel.unknownRole==='part'&&hasTimes&&!hasFrac) return{ok:false,fb:`The unknown is the part — use one fraction of.`};
    const spokenFrac=FRAC_NAMES.find(f=>tokens.includes(f));
    if(spokenFrac){
      const expected=rel.type==='fractional'?fracName(rel.denominator):null;
      if(expected&&spokenFrac!==expected) return{ok:false,fb:`Count the equal parts — there are ${rel.denominator}. Use ${fracName(rel.denominator)}.`};
    }
  }
  return{ok:false,fb:`Try: ${rel.correct.join(' ')}`};
}

// ── Timer ─────────────────────────────────────────────────────────────────────
const DUR=60,CIRC=2*Math.PI*24; // 60 seconds — compound items take longer
function tRing(t){const off=CIRC*(1-t/DUR);return`<div class="timer-ring"><svg width="56" height="56" viewBox="0 0 56 56"><circle class="bg" cx="28" cy="28" r="24"/><circle class="fg${t<=12?' urgent':''}" cx="28" cy="28" r="24" stroke-dasharray="${CIRC.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/></svg><div class="timer-label">${t}</div></div>`;}

// ── State ─────────────────────────────────────────────────────────────────────
const S={
  phase:'intro',t:DUR,timer:null,cor:0,err:0,
  item:null,asm:[],start:null,errors:[],
  ci:0,cItem:null,cAsm:[],cFb:null,
  itemPhase:1, // 1 = solving first rel, 2 = solving second rel
};
function render(h){document.getElementById('main').innerHTML=h;}
function setPhase(l){document.getElementById('phaseLabel').textContent=l;}

// ── Drill ─────────────────────────────────────────────────────────────────────
function showIntro(){
  render(`<div class="intro-card fu">
    <h2>Compound Relations — Fluency</h2>
    <p>You will see two linked bar models for <strong>60 seconds</strong>.</p>
    <p>Identify which relation is solvable first, name it, then use that value to solve the second.</p>
    <p style="color:var(--accent);font-weight:600">Go as fast as you accurately can.</p>
    <button class="start-btn" onclick="startDrill()">Start</button>
  </div>`);
}

function startDrill(){
  S.phase='drill';S.cor=0;S.err=0;S.t=DUR;S.start=new Date().toISOString();S.errors=[];
  setPhase('Practice');nextItem();
  S.timer=setInterval(()=>{S.t--;updateT();if(S.t<=0)endDrill();},1000);
}

function nextItem(){S.item=genCompound();S.asm=[];S.itemPhase=1;draw();}

function draw(){
  const item=S.item;
  const colors=allColors(item);
  const solved=S.itemPhase===2;
  const solvable=item.solvableOnTop?item.relA:item.relB;
  const second=item.solvableOnTop?item.relB:item.relA;
  const activeRel=S.itemPhase===1?solvable:second;
  const pos1=item.solvableOnTop?'top':'bottom';
  const pos2=item.solvableOnTop?'bottom':'top';
  const activePos=S.itemPhase===1?pos1:pos2;

  render(`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">${tRing(S.t)}</div>
    <div class="drill-layout fu">
      <div class="model-area">
        <div class="phase-tag active">Relation ${S.itemPhase} of 2 — ${activePos} model</div>
        ${renderCompound(item,solved)}
      </div>
      ${wb(colors,S.itemPhase===1?'addT1':'addT2')}
    </div>
    ${strip(S.asm,S.itemPhase===1?'sub1':'sub2',S.itemPhase===1?'back1':'back2')}`);
}

function updateT(){
  const r=document.querySelector('.timer-ring');if(!r)return;
  const off=CIRC*(1-S.t/DUR);
  const fg=r.querySelector('.fg'),lb=r.querySelector('.timer-label');
  if(fg){fg.setAttribute('stroke-dashoffset',off.toFixed(1));if(S.t<=12)fg.classList.add('urgent');}
  if(lb)lb.textContent=S.t;
}

function addT1(w){S.asm.push(w);draw();}
function back1(){S.asm.pop();draw();}
function addT2(w){S.asm.push(w);draw();}
function back2(){S.asm.pop();draw();}

function sub1(){
  if(S.phase!=='drill')return;
  const item=S.item;
  const solvable=item.solvableOnTop?item.relA:item.relB;
  const{ok,fb}=check(S.asm,solvable);
  if(ok){
    S.cor++;S.asm=[];S.itemPhase=2;
    // Show bridge pop then redraw phase 2
    drawBridgePop();
  } else {
    S.err++;S.errors.push({item:S.item,fb,phase:1,asm:[...S.asm]});
    nextItem();
  }
}

function drawBridgePop(){
  const item=S.item;
  const colors=allColors(item);
  const second=item.solvableOnTop?item.relB:item.relA;
  const pos2=item.solvableOnTop?'bottom':'top';

  render(`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">${tRing(S.t)}</div>
    <div class="drill-layout fu">
      <div class="model-area">
        <style>@keyframes popIn{0%{transform:scale(0.8);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}.bridge-pop{animation:popIn 0.35s ease forwards;}</style>
        <div class="phase-tag active">Relation 2 of 2 — ${pos2} model</div>
        ${renderCompound(item,true)}
      </div>
      ${wb(colors,'addT2')}
    </div>
    ${strip(S.asm,'sub2','back2')}`);
}

function sub2(){
  if(S.phase!=='drill')return;
  const item=S.item;
  const second=item.solvableOnTop?item.relB:item.relA;
  const{ok,fb}=check(S.asm,second);
  if(ok){S.cor++;nextItem();}
  else{S.err++;S.errors.push({item:S.item,fb,phase:2,asm:[...S.asm]});nextItem();}
}

function endDrill(){
  clearInterval(S.timer);S.phase='results';setPhase('Results');
  const cpm=Math.round(S.cor*(60/DUR)*2); // normalize to per-minute rate
  const epm=Math.round(S.err*(60/DUR)*2);
  saveSession({date:S.start,lesson:CFG.id,phase:'fluency',corrects:S.cor,errors:S.err,cpm,epm,duration:DUR});
  render(`<div class="results-card fu"><h2>Session Complete</h2>
    <div class="rate-row">
      <div class="rate-stat"><div class="rate-num c">${cpm}</div><div class="rate-sub">Correct / min</div></div>
      <div style="font-size:26px;color:var(--text-muted);padding-top:10px">/</div>
      <div class="rate-stat"><div class="rate-num e">${epm}</div><div class="rate-sub">Errors / min</div></div>
    </div>
    <p style="color:var(--text-secondary);font-size:14px;margin-bottom:${S.errors.length?'16px':'0'}">${S.cor} correct and ${S.err} error${S.err!==1?'s':''} in 60 seconds.</p>
    ${S.errors.length?`<button class="btn-continue" onclick="startCorrections()">Review ${S.errors.length} missed item${S.errors.length!==1?'s':''} →</button>`
    :`<div class="nav-links"><a class="nav-link" href="${CFG.lessonHref}">Back to Lesson</a><a class="nav-link primary" href="${CFG.chartHref}">View Chart</a><a class="nav-link" onclick="location.reload()">Again</a></div>`}
  </div>`);
}

// ── Corrections ───────────────────────────────────────────────────────────────
function startCorrections(){S.phase='correction';S.ci=0;setPhase('Review');showC();}

function showC(){
  if(S.ci>=S.errors.length){doneC();return;}
  const e=S.errors[S.ci];S.cItem=e.item;S.cAsm=[];S.cFb=e.fb;
  const solved=e.phase===2;
  const colors=allColors(S.cItem);
  const activeRel=e.phase===1?(S.cItem.solvableOnTop?S.cItem.relA:S.cItem.relB):(S.cItem.solvableOnTop?S.cItem.relB:S.cItem.relA);
  const pos=e.phase===1?(S.cItem.solvableOnTop?'top':'bottom'):(S.cItem.solvableOnTop?'bottom':'top');

  render(`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-size:13px;font-weight:600;color:var(--text-secondary)">Missed item ${S.ci+1} of ${S.errors.length}</span>
      <span style="font-size:12px;color:var(--text-muted)">${S.errors.length-S.ci} remaining</span>
    </div>
    <div class="feedback-card">${S.cFb}</div>
    <div class="drill-layout fu">
      <div class="model-area">
        <div class="phase-tag active">Relation ${e.phase} of 2 — ${pos} model</div>
        ${renderCompound(S.cItem,solved)}
      </div>
      ${wb(colors,'addC')}
    </div>
    ${strip(S.cAsm,'subC','backC')}`);
}

function addC(w){S.cAsm.push(w);showC();}
function backC(){S.cAsm.pop();showC();}

function subC(){
  const e=S.errors[S.ci];
  const activeRel=e.phase===1?(S.cItem.solvableOnTop?S.cItem.relA:S.cItem.relB):(S.cItem.solvableOnTop?S.cItem.relB:S.cItem.relA);
  const{ok,fb}=check(S.cAsm,activeRel);
  if(ok){
    const rem=S.errors.length-S.ci-1;
    const colors=allColors(S.cItem);
    const solved=e.phase===2;
    render(`<div class="feedback-card ok fu">✓ Correct — ${activeRel.correct.join(' ')}</div>
      <div class="drill-layout"><div class="model-area">${renderCompound(S.cItem,solved)}</div>${wb(colors,'addC')}</div>
      <button class="btn-continue" style="margin-top:10px" onclick="nextC()">${rem>0?'Next missed item →':'Finish review'}</button>`);
  } else {
    S.cFb=fb;S.cAsm=[];showC();
  }
}

function nextC(){S.ci++;showC();}
function doneC(){
  setPhase('Complete');
  render(`<div class="results-card fu"><h2>Review Complete</h2>
    <p style="color:var(--text-secondary);font-size:14px;margin-bottom:16px">You worked through all ${S.errors.length} missed item${S.errors.length!==1?'s':''}.</p>
    <div class="nav-links"><a class="nav-link" onclick="location.reload()">Practice Again</a><a class="nav-link primary" href="${CFG.chartHref}">View Chart</a><a class="nav-link" href="${CFG.lessonHref}">Back to Lesson</a></div>
  </div>`);
}

showIntro();
</script>
</body>
</html>
