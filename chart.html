<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Progress Chart</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root{
    --bg:#F7F4EF;--surface:#FFFFFF;--border:#E2DDD6;
    --text-primary:#1A1714;--text-secondary:#6B6560;--text-muted:#9B9591;
    --accent:#2D6A4F;--accent-light:#EAF4EF;--error:#C0392B;
    --radius:12px;--radius-lg:20px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;padding:24px;}
  .app{width:100%;max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:20px;}
  .header{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .title{font-family:'DM Serif Display',serif;font-size:26px;letter-spacing:-0.5px;flex:1;}
  .nav-link{padding:10px 18px;border-radius:var(--radius);border:2px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--text-primary);cursor:pointer;transition:all 0.15s;text-decoration:none;display:inline-block;}
  .nav-link:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
  .nav-link.primary{background:var(--accent);border-color:var(--accent);color:white;}
  .nav-link.primary:hover{background:#255C43;}
  .nav-link.danger{border-color:var(--error);color:var(--error);}
  .nav-link.danger:hover{background:var(--error);color:white;}
  .nav-link.active{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}

  .stats-row{display:flex;gap:12px;flex-wrap:wrap;}
  .stat-card{flex:1;min-width:120px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 18px;}
  .stat-num{font-family:'DM Serif Display',serif;font-size:28px;}
  .stat-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-top:3px;}
  .stat-sub{font-size:11px;color:var(--text-secondary);margin-top:2px;}

  .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;box-shadow:0 2px 12px rgba(0,0,0,0.04);}
  .chart-controls{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .chart-title-text{font-size:13px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;flex:1;}
  .view-toggle{display:flex;gap:6px;}
  .toggle-btn{padding:5px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--text-secondary);cursor:pointer;transition:all 0.12s;}
  .toggle-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}

  .chart-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .chart-scroll svg{display:block;}

  .legend-section{margin-top:16px;display:flex;flex-direction:column;gap:8px;}
  .legend-row{display:flex;gap:16px;flex-wrap:wrap;align-items:center;}
  .legend-lesson{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;}
  .legend-swatch{display:flex;align-items:center;gap:6px;}
  .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .legend-x{font-size:13px;font-weight:700;line-height:1;}
  .legend-sep{width:1px;height:16px;background:var(--border);}
  .legend-label{color:var(--text-secondary);font-size:12px;}

  .scale-note{font-size:11px;color:var(--text-muted);margin-top:8px;}

  .session-table{width:100%;border-collapse:collapse;font-size:13px;}
  .session-table th{text-align:left;padding:8px 10px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);border-bottom:2px solid var(--border);}
  .session-table td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--text-secondary);}
  .session-table tr:last-child td{border-bottom:none;}
  .c-val{font-weight:600;}
  .e-val{font-weight:600;color:var(--error);}
  .phase-tag{font-size:11px;padding:2px 7px;border-radius:20px;font-weight:600;background:var(--accent-light);color:var(--accent);}
  .lesson-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;}

  .empty{text-align:center;padding:48px 24px;}
  .empty h3{font-family:'DM Serif Display',serif;font-size:20px;color:var(--text-secondary);margin-bottom:8px;}
  .empty p{color:var(--text-muted);font-size:14px;}

  .nav-row{display:flex;gap:10px;flex-wrap:wrap;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="title">Progress Chart</span>
    <a class="nav-link" href="index.html">Home</a>
  </div>

  <div class="stats-row" id="statsRow"></div>

  <div class="chart-card">
    <div class="chart-controls">
      <span class="chart-title-text">Rate Over Time — All Lessons</span>
      <div class="view-toggle">
        <button class="toggle-btn active" id="btnScroll" onclick="setView('scroll')">Scroll</button>
        <button class="toggle-btn" id="btnOverview" onclick="setView('overview')">Overview</button>
      </div>
    </div>
    <div class="chart-scroll" id="chartWrap">
      <div class="empty"><h3>No data yet</h3><p>Complete a fluency session to see your chart.</p></div>
    </div>
    <div class="legend-section" id="legendSection"></div>
    <p class="scale-note">Vertical axis: semi-logarithmic. Dots = correct/min, × = errors/min. Lines do not connect across gaps larger than 1 day.</p>
  </div>

  <div class="chart-card">
    <div class="chart-controls"><span class="chart-title-text">Session History</span></div>
    <div id="sessionTable"></div>
  </div>

  <div class="nav-row">
    <button class="nav-link danger" onclick="clearAll()">Clear All Data</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// LESSON CONFIG
// ═══════════════════════════════════════════════════════════════════════════════
const LESSONS = [
  { id:1, label:'Equal',          key:'fluency_l1_sessions', color:'#2D6A4F', fluency:'fluency-l1.html' },
  { id:2, label:'Part-Whole',     key:'fluency_l2_sessions', color:'#1B6CA8', fluency:'fluency-l2.html' },
  { id:3, label:'Comparison',     key:'fluency_l3_sessions', color:'#D4600A', fluency:'fluency-l3.html' },
  { id:4, label:'Fractional',     key:'fluency_l4_sessions', color:'#6C3483', fluency:'fluency-l4.html' },
  { id:5, label:'Multiplicative', key:'fluency_l5_sessions', color:'#C0392B', fluency:'fluency-l5.html' },
];

// ═══════════════════════════════════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════════════════════════════════
function loadAll() {
  return LESSONS.map(L => {
    try {
      const raw = localStorage.getItem(L.key);
      const sessions = raw ? JSON.parse(raw) : [];
      return { ...L, sessions: sessions.filter(s => s.phase === 'fluency' && (s.cpm > 0 || s.epm > 0)) };
    } catch(e) { return { ...L, sessions: [] }; }
  });
}

function clearAll() {
  if (!confirm('Clear ALL session data for all lessons? This cannot be undone.')) return;
  LESSONS.forEach(L => { try { localStorage.removeItem(L.key); } catch(e) {} });
  location.reload();
}

// ═══════════════════════════════════════════════════════════════════════════════
// SEMI-LOG CHART ENGINE
// ═══════════════════════════════════════════════════════════════════════════════
const LOG_MIN = Math.log10(0.5);
const LOG_MAX = Math.log10(500);
const Y_TICKS = [0.5, 1, 2, 5, 10, 20, 50, 100, 200, 500];
const DAY_MS = 86400000;
const GAP_THRESHOLD = 1; // days — don't connect across gaps larger than this

function toY(value, H, PT, PB) {
  const v = Math.max(value, 0.5);
  const pct = (Math.log10(v) - LOG_MIN) / (LOG_MAX - LOG_MIN);
  return PT + (1 - pct) * (H - PT - PB);
}

function dayKey(dateStr) {
  const d = new Date(dateStr);
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

function dayIndex(dateStr, minDate) {
  const d = new Date(dateStr);
  const m = new Date(minDate);
  // floor both to midnight
  const dDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const mDay = new Date(m.getFullYear(), m.getMonth(), m.getDate());
  return Math.round((dDay - mDay) / DAY_MS);
}

let currentView = 'scroll';

function setView(v) {
  currentView = v;
  document.getElementById('btnScroll').classList.toggle('active', v === 'scroll');
  document.getElementById('btnOverview').classList.toggle('active', v === 'overview');
  renderChart();
}

function buildChart(lessonData, viewMode) {
  // Gather all sessions across lessons, find date range
  const allSessions = lessonData.flatMap(L => L.sessions.map(s => ({ ...s, lesson: L })));
  if (!allSessions.length) return null;

  allSessions.sort((a, b) => new Date(a.date) - new Date(b.date));
  const minDate = allSessions[0].date;
  const maxDate = allSessions[allSessions.length - 1].date;
  const totalDays = dayIndex(maxDate, minDate) + 1;

  const H = 360;
  const PT = 20, PB = 48, PL = 58, PR = 28;

  // In scroll view: 48px per day minimum, min width 560
  // In overview: fit to 860px max
  const DAY_W = viewMode === 'scroll' ? Math.max(48, 560 / Math.max(totalDays, 1)) : Math.min(860 / Math.max(totalDays, 1), 48);
  const CW = Math.max(totalDays * DAY_W, 480);
  const W = PL + CW + PR;

  function xAt(dateStr) {
    const di = dayIndex(dateStr, minDate);
    return PL + (di / Math.max(totalDays - 1, 1)) * CW;
  }

  // Grid lines — Y axis
  let grid = '';
  Y_TICKS.forEach(v => {
    const y = toY(v, H, PT, PB);
    const isMajor = [1, 10, 100].includes(v);
    grid += `<line x1="${PL}" x2="${W-PR}" y1="${y.toFixed(1)}" y2="${y.toFixed(1)}"
      stroke="${isMajor?'#C5C0BB':'#E2DDD6'}" stroke-width="${isMajor?1.5:1}"/>`;
    grid += `<text x="${(PL-7).toFixed(1)}" y="${(y+4).toFixed(1)}" text-anchor="end"
      font-size="11" fill="#9B9591" font-family="DM Sans,sans-serif">${v<1?'0.5':v}</text>`;
  });

  // X axis labels — one per day when scroll, sparse when overview
  let xLabels = '';
  const labelEvery = viewMode === 'overview' ? Math.ceil(totalDays / 12) : 1;
  for (let di = 0; di < totalDays; di += labelEvery) {
    const d = new Date(new Date(minDate).setDate(new Date(minDate).getDate() + di));
    const x = PL + (di / Math.max(totalDays - 1, 1)) * CW;
    xLabels += `<text x="${x.toFixed(1)}" y="${(H-PB+15).toFixed(1)}" text-anchor="middle"
      font-size="10" fill="#9B9591" font-family="DM Sans,sans-serif">${d.getMonth()+1}/${d.getDate()}</text>`;
  }

  // Per lesson, per metric: build path and markers
  // Correct = filled circle, solid line
  // Error = X marker, dashed line
  let series = '';

  lessonData.forEach(L => {
    if (!L.sessions.length) return;
    const color = L.color;

    // Sort sessions by date
    const sorted = [...L.sessions].sort((a, b) => new Date(a.date) - new Date(b.date));

    // Build point arrays
    const cpts = sorted.map(s => ({ x: xAt(s.date), y: toY(Math.max(s.cpm||0, 0.5), H, PT, PB), v: s.cpm||0, date: s.date }));
    const epts = sorted.map(s => ({ x: xAt(s.date), y: toY(Math.max(s.epm||0, 0.5), H, PT, PB), v: s.epm||0, date: s.date }));

    // Build segmented path — don't connect across gaps > GAP_THRESHOLD days
    function segmentedPath(pts, dashed) {
      if (!pts.length) return '';
      let d = '';
      for (let i = 0; i < pts.length; i++) {
        if (i === 0) {
          d += `M${pts[i].x.toFixed(1)},${pts[i].y.toFixed(1)}`;
        } else {
          const gap = dayIndex(pts[i].date, pts[i-1].date);
          if (gap > GAP_THRESHOLD) {
            d += ` M${pts[i].x.toFixed(1)},${pts[i].y.toFixed(1)}`;
          } else {
            d += ` L${pts[i].x.toFixed(1)},${pts[i].y.toFixed(1)}`;
          }
        }
      }
      return `<path d="${d}" fill="none" stroke="${color}" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" ${dashed?'stroke-dasharray="5,4"':''} opacity="0.85"/>`;
    }

    // Dot marker (correct)
    function dotMarkers(pts) {
      return pts.map(p => {
        const label = viewMode === 'scroll' ? `<text x="${p.x.toFixed(1)}" y="${(p.y-9).toFixed(1)}" text-anchor="middle" font-size="10" fill="${color}" font-family="DM Sans,sans-serif">${p.v}</text>` : '';
        return `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${viewMode==='scroll'?5:3.5}" fill="${color}" stroke="white" stroke-width="1.5"/>${label}`;
      }).join('');
    }

    // X marker (error) — drawn as two crossing lines
    function xMarkers(pts) {
      const sz = viewMode === 'scroll' ? 5 : 3.5;
      return pts.filter(p => p.v > 0).map(p => {
        const label = viewMode === 'scroll' ? `<text x="${p.x.toFixed(1)}" y="${(p.y+sz+11).toFixed(1)}" text-anchor="middle" font-size="10" fill="${color}" font-family="DM Sans,sans-serif" opacity="0.8">${p.v}</text>` : '';
        return `<line x1="${(p.x-sz).toFixed(1)}" y1="${(p.y-sz).toFixed(1)}" x2="${(p.x+sz).toFixed(1)}" y2="${(p.y+sz).toFixed(1)}" stroke="${color}" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="${(p.x+sz).toFixed(1)}" y1="${(p.y-sz).toFixed(1)}" x2="${(p.x-sz).toFixed(1)}" y2="${(p.y+sz).toFixed(1)}" stroke="${color}" stroke-width="2.5" stroke-linecap="round"/>${label}`;
      }).join('');
    }

    series += segmentedPath(cpts, false);
    series += segmentedPath(epts, true);
    series += dotMarkers(cpts);
    series += xMarkers(epts);
  });

  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    <rect width="${W}" height="${H}" fill="white" rx="8"/>
    ${grid}
    <line x1="${PL}" y1="${PT}" x2="${PL}" y2="${H-PB}" stroke="#9B9591" stroke-width="1.5"/>
    <line x1="${PL}" y1="${H-PB}" x2="${W-PR}" y2="${H-PB}" stroke="#9B9591" stroke-width="1.5"/>
    <text x="14" y="${(H/2).toFixed(1)}" text-anchor="middle" font-size="11" fill="#9B9591"
      font-family="DM Sans,sans-serif" transform="rotate(-90,14,${(H/2).toFixed(1)})">Responses / min</text>
    ${xLabels}
    ${series}
  </svg>`;
}

function buildLegend(lessonData) {
  const active = lessonData.filter(L => L.sessions.length > 0);
  if (!active.length) return '';
  const items = active.map(L => `
    <div class="legend-lesson">
      <div class="legend-dot" style="background:${L.color}"></div>
      <span style="color:${L.color}">${L.label}</span>
    </div>
    <div class="legend-swatch">
      <div class="legend-dot" style="background:${L.color}"></div>
      <span class="legend-label">correct/min</span>
    </div>
    <div class="legend-swatch">
      <span class="legend-x" style="color:${L.color}">×</span>
      <span class="legend-label">errors/min</span>
    </div>
    <div class="legend-sep"></div>`).join('');
  return `<div class="legend-row">${items}</div>`;
}

// ═══════════════════════════════════════════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════════════════════════════════════════
function buildStats(lessonData) {
  const active = lessonData.filter(L => L.sessions.length > 0);
  if (!active.length) return '';
  return active.map(L => {
    const s = L.sessions;
    const latest = s[s.length-1];
    const best = s.reduce((b,x) => x.cpm>b.cpm?x:b, s[0]);
    return `<div class="stat-card" style="border-left:3px solid ${L.color}">
      <div class="stat-num" style="color:${L.color}">${latest.cpm}</div>
      <div class="stat-label">${L.label}</div>
      <div class="stat-sub">Best: ${best.cpm}/min · ${s.length} session${s.length!==1?'s':''}</div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════════════════════════
// SESSION TABLE
// ═══════════════════════════════════════════════════════════════════════════════
function buildTable(lessonData) {
  const allRows = [];
  lessonData.forEach(L => {
    L.sessions.forEach((s, i) => {
      allRows.push({ ...s, lessonLabel: L.label, lessonColor: L.color });
    });
  });
  if (!allRows.length) return '<p style="color:var(--text-muted);padding:16px 0;font-size:14px">No sessions recorded yet.</p>';
  allRows.sort((a,b) => new Date(b.date) - new Date(a.date));
  const rows = allRows.map((s,i) => {
    const d = new Date(s.date);
    const ds = `${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}`;
    const ts = d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    return `<tr>
      <td><span class="lesson-dot" style="background:${s.lessonColor}"></span>${s.lessonLabel}</td>
      <td>${ds} ${ts}</td>
      <td><span class="c-val" style="color:${s.lessonColor}">${s.cpm}</span></td>
      <td><span class="e-val">${s.epm}</span></td>
      <td>${s.corrects} / ${s.errors}</td>
    </tr>`;
  }).join('');
  return `<table class="session-table">
    <thead><tr><th>Lesson</th><th>Date</th><th>Correct/min</th><th>Errors/min</th><th>Raw (C/E)</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ═══════════════════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════════════════
let cachedLessonData = null;

function renderChart() {
  const svg = buildChart(cachedLessonData, currentView);
  document.getElementById('chartWrap').innerHTML = svg ||
    '<div class="empty"><h3>No data yet</h3><p>Complete a fluency session to see your chart.</p></div>';
}

function init() {
  cachedLessonData = loadAll();
  document.getElementById('statsRow').innerHTML = buildStats(cachedLessonData);
  renderChart();
  document.getElementById('legendSection').innerHTML = buildLegend(cachedLessonData);
  document.getElementById('sessionTable').innerHTML = buildTable(cachedLessonData);
}

init();
</script>
</body>
</html>
