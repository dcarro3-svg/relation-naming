<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparisons and Differences — Lesson Three</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root {
    --bg:#F7F4EF;--surface:#FFFFFF;--border:#E2DDD6;
    --text-primary:#1A1714;--text-secondary:#6B6560;--text-muted:#9B9591;
    --accent:#2D6A4F;--accent-light:#EAF4EF;--accent-warm:#C17D3C;--accent-warm-light:#FBF0E4;
    --radius:12px;--radius-lg:20px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-primary);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
  .app{width:100%;max-width:680px;display:flex;flex-direction:column;gap:20px;}
  .header{display:flex;align-items:center;gap:12px;}
  .lesson-label{font-family:'DM Serif Display',serif;font-size:26px;letter-spacing:-0.5px;}
  .phase-label{font-size:12px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;flex:1;}
  .tts-toggle{width:34px;height:34px;border-radius:50%;border:2px solid var(--border);
    background:var(--surface);display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:all 0.15s;flex-shrink:0;margin-left:auto;}
  .tts-toggle svg{width:16px;height:16px;fill:var(--text-muted);transition:fill 0.15s;}
  .tts-toggle.on{border-color:var(--accent);background:var(--accent-light);}
  .tts-toggle.on svg{fill:var(--accent);}
  .tts-toggle:hover{border-color:var(--accent);}
  .tts-toggle:hover svg{fill:var(--accent);}
  .progress-track{height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.5s ease;}
  .canvas{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
    padding:44px 40px;display:flex;align-items:center;justify-content:center;
    min-height:240px;box-shadow:0 2px 12px rgba(0,0,0,0.04);animation:fadeUp 0.35s ease;overflow:visible;}
  .key-point{background:var(--accent-light);border:1px solid #B8DAC8;border-radius:var(--radius-lg);
    padding:18px 24px;font-size:16px;font-weight:500;color:var(--text-primary);
    line-height:1.6;animation:fadeUp 0.35s ease;display:flex;align-items:flex-start;gap:12px;}
  .key-point.correction{background:var(--accent-warm-light);border-color:#E8C99A;}
  .key-point.neutral{background:var(--surface);border-color:var(--border);font-weight:400;}
  .key-point.bridge{background:#F0EAF8;border-color:#C9B8E8;}
  .audio-indicator{width:32px;height:32px;border-radius:50%;background:var(--accent);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;
    transition:all 0.15s;border:none;margin-top:2px;}
  .audio-indicator:hover{background:#255C43;transform:scale(1.05);}
  .audio-indicator.speaking{background:var(--accent-warm);animation:pulse 1s infinite;}
  .audio-indicator svg{width:16px;height:16px;fill:white;}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  .response-buttons{display:flex;gap:12px;}
  .btn{flex:1;padding:15px 20px;border-radius:var(--radius);border:2px solid var(--border);
    background:var(--surface);font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;
    color:var(--text-primary);cursor:pointer;transition:all 0.15s;}
  .btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);transform:translateY(-1px);}
  .btn:active{transform:translateY(0);}
  .hybrid-row{display:flex;gap:8px;align-items:stretch;}
  .mic-btn{width:48px;height:48px;border-radius:var(--radius);border:2px solid var(--border);
    background:var(--surface);display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:all 0.15s;flex-shrink:0;}
  .mic-btn:hover{border-color:var(--accent);background:var(--accent-light);}
  .mic-btn.listening{border-color:#C0392B;background:#FDF0F0;animation:pulse 0.8s infinite;}
  .mic-btn svg{width:20px;height:20px;}
  .text-input{flex:1;padding:12px 16px;border-radius:var(--radius);border:2px solid var(--border);
    background:var(--surface);font-family:'DM Sans',sans-serif;font-size:16px;
    color:var(--text-primary);outline:none;transition:border-color 0.15s;min-width:0;}
  .text-input:focus{border-color:var(--accent);}
  .text-input::placeholder{color:var(--text-muted);}
  .btn-submit{padding:12px 20px;border-radius:var(--radius);border:none;background:var(--accent);
    color:white;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;
    cursor:pointer;transition:all 0.15s;flex-shrink:0;}
  .btn-submit:hover{background:#255C43;}
  .btn-continue{width:100%;padding:15px;border-radius:var(--radius);border:none;
    background:var(--accent);color:white;font-family:'DM Sans',sans-serif;
    font-size:16px;font-weight:600;cursor:pointer;transition:all 0.15s;}
  .btn-continue:hover{background:#255C43;transform:translateY(-1px);}
  .completion{text-align:center;padding:44px 32px;background:var(--surface);
    border:1px solid var(--border);border-radius:var(--radius-lg);
    box-shadow:0 2px 12px rgba(0,0,0,0.04);animation:fadeUp 0.5s ease;}
  .completion h2{font-family:'DM Serif Display',serif;font-size:26px;margin:12px 0 10px;color:var(--accent);}
  .completion p{color:var(--text-secondary);font-size:15px;line-height:1.6;max-width:400px;margin:0 auto;}
  .relations-found{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
  .relation-tag{background:var(--accent-light);border:1px solid #B8DAC8;border-radius:20px;
    padding:4px 12px;font-size:13px;font-weight:500;color:var(--accent);}

  /* Decomposition fade animations */
  .decomp-bar { transition: opacity 0.45s ease, transform 0.45s ease; }
  .decomp-bar.fading { opacity: 0; transform: scale(0.96); }
  .decomp-bar.faded { opacity: 0; pointer-events: none; }

  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="lesson-label">Comparisons &amp; Differences</span>
    <span class="phase-label" id="phaseLabel">Review</span>
    <button class="tts-toggle" id="ttsToggle" onclick="toggleTTS()" title="Toggle audio">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    </button>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div id="mainContent"></div>
  <div id="responseArea"></div>
</div>
<script>
// ═══════════════════════════════════════════════════════════════════════════════
// TTS
// ═══════════════════════════════════════════════════════════════════════════════
let ttsEnabled=true;
function toggleTTS(){
  ttsEnabled=!ttsEnabled;
  const b=document.getElementById('ttsToggle');
  if(b) b.classList.toggle('on',ttsEnabled);
  if(!ttsEnabled) window.speechSynthesis.cancel();
  rerenderCurrent();
}
function rerenderCurrent(){
  switch(S.phase){
    case 'intro': showIntro(); break;
    case 'review': if(S.currentModel) rerenderReview(); break;
    case 'instruction': showInstruct(S.instructStep); break;
    case 'decomp': showDecompStep(S.decompStep); break;
    case 'ident': if(S.currentModel) rerenderIdent(); break;
    case 'naming': if(S.currentNaming) showNamingItem(); break;
    case 'bridge': showBridge(); break;
    case 'free': if(S.freeModel) rerenderFree(); break;
  }
}
let currentUtterance=null;
function speak(text,onEnd){
  if(!ttsEnabled){if(onEnd) onEnd();return;}
  const clean=text.replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim();
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(clean);
  utt.rate=0.92;utt.pitch=1.0;utt.volume=1.0;
  const voices=window.speechSynthesis.getVoices();
  const pref=voices.find(v=>v.name.includes('Samantha')||v.name.includes('Karen')||v.name.includes('Daniel')||v.name.includes('Google')||v.lang==='en-US');
  if(pref) utt.voice=pref;
  utt.onstart=()=>{const b=document.getElementById('audioBtn');if(b)b.classList.add('speaking');};
  utt.onend=()=>{const b=document.getElementById('audioBtn');if(b)b.classList.remove('speaking');if(onEnd)onEnd();};
  utt.onerror=()=>{if(onEnd)onEnd();};
  currentUtterance=utt;
  window.speechSynthesis.speak(utt);
}
function replayAudio(){if(currentUtterance&&ttsEnabled)speak(currentUtterance.text);}
function aBtn(){return`<button class="audio-indicator" id="audioBtn" onclick="replayAudio()" title="Replay audio"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg></button>`;}

// ═══════════════════════════════════════════════════════════════════════════════
// SPEECH INPUT
// ═══════════════════════════════════════════════════════════════════════════════
let recognition=null,isListening=false;
function toggleMic(id,fn){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Speech recognition not supported. Please type.');return;}
  if(isListening){if(recognition)recognition.stop();isListening=false;updateMicBtn(false);return;}
  recognition=new SR();recognition.continuous=false;recognition.interimResults=false;recognition.lang='en-US';
  recognition.onstart=()=>{isListening=true;updateMicBtn(true);};
  recognition.onresult=(e)=>{const t=e.results[0][0].transcript;const inp=document.getElementById(id);if(inp){inp.value=t;setTimeout(()=>fn(),400);}};
  recognition.onerror=()=>{isListening=false;updateMicBtn(false);};
  recognition.onend=()=>{isListening=false;updateMicBtn(false);};
  recognition.start();
}
function updateMicBtn(l){const b=document.getElementById('micBtn');if(b){b.classList.toggle('listening',l);b.title=l?'Listening...':'Speak your answer';}}
function mBtn(id,fn){return`<button class="mic-btn" id="micBtn" onclick="toggleMic('${id}',${fn})" title="Speak your answer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg></button>`;}
function hInput(id,ph,fn){return`<div class="hybrid-row">${mBtn(id,fn)}<input class="text-input" id="${id}" type="text" placeholder="${ph}" onkeydown="if(event.key==='Enter')${fn}()"><button class="btn-submit" onclick="${fn}()">Submit</button></div>`;}

// ═══════════════════════════════════════════════════════════════════════════════
// COLORS
// ═══════════════════════════════════════════════════════════════════════════════
const COLORS=[{name:'blue',hex:'#1B6CA8'},{name:'orange',hex:'#D4600A'},{name:'green',hex:'#2D6A4F'},
  {name:'red',hex:'#C0392B'},{name:'purple',hex:'#6C3483'},{name:'teal',hex:'#0E7E7E'},
  {name:'pink',hex:'#B03A6E'},{name:'navy',hex:'#1A3A5C'}];
const CF={blue:['blue','navy','teal','dark blue'],navy:['navy','blue','dark blue'],
  teal:['teal','blue','green','dark green'],green:['green','teal','dark green'],
  red:['red','pink','dark red'],pink:['pink','red'],orange:['orange'],purple:['purple','violet']};
function fam(n){const f=CF[n]||[n];return COLORS.filter(c=>f.includes(c.name)||(CF[c.name]||[c.name]).includes(n)).map(c=>c.name);}
function randColor(ex=[]){const ef=ex.flatMap(n=>fam(n));const pool=COLORS.filter(c=>!ef.includes(c.name));return pool.length?pool[Math.floor(Math.random()*pool.length)]:COLORS.filter(c=>!ex.includes(c.name))[0];}
function cmatch(r,name){return[...(CF[name]||[name]),name].some(f=>r.includes(f));}
function colorMatches(s,a){return(CF[a]||[a]).includes(s)||s===a;}
function tc(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(0.299*r+0.587*g+0.114*b)/255>0.55?'#1A1714':'#FFFFFF';}
function dt(full,short){return ttsEnabled?short:full;}

// ═══════════════════════════════════════════════════════════════════════════════
// BAR BUILDER
// ═══════════════════════════════════════════════════════════════════════════════
const BH=62,BW=62,BASE=340;
function sbar(hex,name,w,h,isUnknown=false,faded=false){
  const bg=faded?hex+'44':hex;
  const col=faded?'#777':tc(hex);
  const bdr=faded?'2px dashed #9B9591':'none';
  const content=isUnknown
    ?`<span style="font-family:'DM Serif Display',serif;font-size:24px;font-style:italic;color:${col}">?</span>`
    :`<span style="font-size:12px;font-weight:600;text-transform:capitalize;letter-spacing:0.3px;color:${col}">${name}</span>`;
  return`<div style="width:${w}px;height:${h}px;background:${bg};border-radius:6px;border:${bdr};display:flex;align-items:center;justify-content:center;flex-shrink:0">${content}</div>`;
}

// ═══════════════════════════════════════════════════════════════════════════════
// COMPARISON MODEL RENDERERS
// ═══════════════════════════════════════════════════════════════════════════════
// A comparison model has:
//   larger: { color, w/h }
//   smaller: { color, w/h }  (smaller.w = larger.w - diff.w)
//   diff: { color, w/h } — can be null (not shown), 'pale' (pale extension), or full color bar
//   showBrace: bool — shows curly brace in gap when diff is separate bar
//   unknownRole: null | 'larger' | 'smaller' | 'diff'
//   orientation: 'h' | 'v'

function renderComparison(m){
  return m.orientation==='v' ? renderComparisonV(m) : renderComparisonH(m);
}

// ── Horizontal comparison ──────────────────────────────────────────────────────
// Larger bar: full width, top row
// Smaller bar: left-aligned, bottom row
// Diff bar: right-aligned, bottom row
// Two vertical dashed lines mark the left and right edges of the diff bar,
// running through BOTH rows — same visual language as equal relation confirmation
function renderComparisonH(m){
  const{larger,smaller,diff,showBrace,unknownRole}=m;
  const largeBar=sbar(larger.color.hex,larger.color.name,larger.w,BH,unknownRole==='larger');
  const smallBar=sbar(smaller.color.hex,smaller.color.name,smaller.w,BH,unknownRole==='smaller');

  if(!diff){
    return`<div style="display:flex;flex-direction:column;align-items:flex-start;gap:8px">
      ${largeBar}${smallBar}</div>`;
  }

  if(diff.style==='pale'){
    const paleExt=`<div style="width:${diff.w}px;height:${BH}px;background:${smaller.color.hex}44;border:2px dashed #9B9591;border-radius:0 6px 6px 0;display:flex;align-items:center;justify-content:center;flex-shrink:0">
      <span style="font-size:11px;font-weight:600;color:#9B9591;text-transform:capitalize">${diff.color.name}</span></div>`;
    return`<div style="display:flex;flex-direction:column;align-items:flex-start;gap:8px">
      ${largeBar}
      <div style="display:flex;flex-direction:row;gap:0">${smallBar}${paleExt}</div>
    </div>`;
  }

  const diffBar=sbar(diff.color.hex,diff.color.name,diff.w,BH,unknownRole==='diff',true);
  const rowGap=8;
  const totalH=BH+rowGap+BH; // full height of both rows + gap

  // Two vertical dashed lines running full height of both rows
  // Left line: at smaller.w (left edge of diff / right edge of smaller)
  // Right line: at larger.w (right edge of both larger and diff)
  const lines=showBrace?`
    <div style="position:absolute;left:${smaller.w}px;top:0;bottom:0;border-left:2px dashed #6B6560;pointer-events:none"></div>
    <div style="position:absolute;left:${larger.w}px;top:0;bottom:0;border-left:2px dashed #6B6560;pointer-events:none"></div>`:'';

  return`<div style="position:relative;display:inline-block">
    ${lines}
    <div style="display:flex;flex-direction:column;align-items:flex-start;gap:${rowGap}px">
      ${largeBar}
      <div style="display:flex;flex-direction:row;gap:0">${smallBar}${diffBar}</div>
    </div>
  </div>`;
}

// ── Vertical comparison ───────────────────────────────────────────────────────
// Larger bar: full height, left column
// Smaller bar: bottom-aligned, right column
// Diff bar: top-aligned, right column
// Two horizontal dashed lines mark the top and bottom edges of the diff bar,
// running through BOTH columns — same visual language as equal relation confirmation
function renderComparisonV(m){
  const{larger,smaller,diff,showBrace,unknownRole}=m;
  const largeBar=sbar(larger.color.hex,larger.color.name,BW,larger.h,unknownRole==='larger');
  const smallBar=sbar(smaller.color.hex,smaller.color.name,BW,smaller.h,unknownRole==='smaller');

  if(!diff){
    return`<div style="display:flex;flex-direction:row;align-items:flex-end;gap:16px">
      ${largeBar}${smallBar}</div>`;
  }

  if(diff.style==='pale'){
    const paleExt=`<div style="width:${BW}px;height:${diff.h}px;background:${smaller.color.hex}44;border:2px dashed #9B9591;border-radius:6px 6px 0 0;display:flex;align-items:center;justify-content:center;flex-shrink:0">
      <span style="font-size:10px;font-weight:600;color:#9B9591;text-transform:capitalize;writing-mode:vertical-lr">${diff.color.name}</span></div>`;
    return`<div style="display:flex;flex-direction:row;align-items:flex-end;gap:16px">
      ${largeBar}
      <div style="display:flex;flex-direction:column;gap:0">${paleExt}${smallBar}</div>
    </div>`;
  }

  const diffBar=sbar(diff.color.hex,diff.color.name,BW,diff.h,unknownRole==='diff',true);
  const colGap=16;

  // Two horizontal dashed lines running full width of both columns
  // Top line: at y=0 (top of diff bar = top of larger bar)
  // Bottom line: at y=diff.h (bottom of diff bar = top of smaller bar)
  const lines=showBrace?`
    <div style="position:absolute;top:0;left:0;right:0;border-top:2px dashed #6B6560;pointer-events:none"></div>
    <div style="position:absolute;top:${diff.h}px;left:0;right:0;border-top:2px dashed #6B6560;pointer-events:none"></div>`:'';

  return`<div style="position:relative;display:inline-block">
    ${lines}
    <div style="display:flex;flex-direction:row;align-items:flex-start;gap:${colGap}px">
      ${largeBar}
      <div style="display:flex;flex-direction:column;gap:0">${diffBar}${smallBar}</div>
    </div>
  </div>`;
}

// Part-whole renderer (for review)
function renderPW(m){
  const{whole,p1,p2,confirmed,layout}=m;
  const isH=m.orientation!=='v';
  if(isH){
    const wBar=sbar(whole.color.hex,whole.color.name,whole.w,BH,whole.unknown||false);
    const p1Bar=sbar(p1.color.hex,p1.color.name,p1.w,BH,p1.unknown||false);
    const p2Bar=sbar(p2.color.hex,p2.color.name,p2.w,BH,p2.unknown||false);
    const partsRow=`<div style="display:flex;flex-direction:row;gap:0">${p1Bar}${p2Bar}</div>`;
    const dotted=confirmed?`<div style="position:absolute;left:0;top:0;bottom:0;border-left:2px dashed #9B9591;pointer-events:none"></div><div style="position:absolute;right:0;top:0;bottom:0;border-right:2px dashed #9B9591;pointer-events:none"></div>`:'';
    if(layout==='above') return`<div style="position:relative;display:inline-block">${dotted}<div style="margin-bottom:6px">${partsRow}</div>${wBar}</div>`;
    return`<div style="position:relative;display:inline-block">${dotted}<div style="margin-bottom:6px">${wBar}</div>${partsRow}</div>`;
  }
  const wBar=sbar(whole.color.hex,whole.color.name,BW,whole.h,whole.unknown||false);
  const p1Bar=sbar(p1.color.hex,p1.color.name,BW,p1.h,p1.unknown||false);
  const p2Bar=sbar(p2.color.hex,p2.color.name,BW,p2.h,p2.unknown||false);
  const partsCol=`<div style="display:flex;flex-direction:column;gap:0">${p1Bar}${p2Bar}</div>`;
  const dotted=confirmed?`<div style="position:absolute;top:0;left:0;right:0;border-top:2px dashed #9B9591;pointer-events:none"></div><div style="position:absolute;bottom:0;left:0;right:0;border-bottom:2px dashed #9B9591;pointer-events:none"></div>`:'';
  return`<div style="display:flex;flex-direction:row;align-items:flex-start;gap:20px"><div style="position:relative">${dotted}${partsCol}</div>${wBar}</div>`;
}

// ═══════════════════════════════════════════════════════════════════════════════
// GENERATORS
// ═══════════════════════════════════════════════════════════════════════════════
function genPWReview(){
  const wC=randColor(),p1C=randColor([wC.name]),p2C=randColor([wC.name,p1C.name]);
  const tw=BASE*(0.55+Math.random()*0.35),split=0.3+Math.random()*0.4;
  const th=160+Math.random()*100;
  const ori=Math.random()>0.5?'h':'v';
  const lay=Math.random()>0.5?'above':'below';
  return{whole:{color:wC,w:tw,h:th,unknown:false},p1:{color:p1C,w:tw*split,h:th*split,unknown:false},
    p2:{color:p2C,w:tw*(1-split),h:th*(1-split),unknown:false},orientation:ori,layout:lay,confirmed:true};
}

function genComparison(showDiff=null, unknownRole=null){
  // showDiff: null (no diff) | 'pale' | 'bar'
  const largeC=randColor();
  const smallC=randColor([largeC.name]);
  const diffC=showDiff==='bar'?randColor([largeC.name,smallC.name]):smallC; // diff uses smallC for pale

  const ori=Math.random()>0.5?'h':'v';
  const largeW=BASE*(0.55+Math.random()*0.3);
  const diffW=largeW*(0.2+Math.random()*0.35);
  const smallW=largeW-diffW;
  const largeH=180+Math.random()*80;
  const diffH=largeH*(0.2+Math.random()*0.35);
  const smallH=largeH-diffH;

  const diff=showDiff?{
    color:diffC, w:diffW, h:diffH,
    style:showDiff==='pale'?'pale':'bar'
  }:null;

  return{
    larger:{color:largeC,w:largeW,h:largeH,unknown:unknownRole==='larger'},
    smaller:{color:smallC,w:smallW,h:smallH,unknown:unknownRole==='smaller'},
    diff:diff?{...diff,unknown:unknownRole==='diff'}:null,
    showBrace:showDiff==='bar',
    orientation:ori,
    unknownRole,
  };
}

// TRUE RELATION CHECKER
// Accepts any true relation about a comparison model
// ═══════════════════════════════════════════════════════════════════════════════
function checkTrueRelation(r, m){
  const{larger,smaller,diff}=m;
  const lN=larger.color.name, sN=smaller.color.name, dN=diff?diff.color.name:null;

  // Normalize
  const hasLarger=cmatch(r,lN), hasSmaller=cmatch(r,sN);
  const hasDiff=dN?cmatch(r,dN):false;
  const hasMore=r.includes('more')||r.includes('greater')||r.includes('bigger')||r.includes('larger');
  const hasLess=r.includes('less')||r.includes('fewer')||r.includes('smaller');
  const hasPlus=r.includes('plus')||r.includes('and')||r.includes('together');
  const hasMinus=r.includes('minus')||r.includes('without')||r.includes('takeaway')||r.includes('take away');
  const hasEqual=r.includes('equal')||r.includes('same')||r.includes('equals');
  const hasDiffWord=r.includes('difference');

  const trueRelations=[];

  // larger is more than smaller
  if(hasLarger&&hasMore) trueRelations.push(`${lN} is more than ${sN}`);
  if(hasSmaller&&hasLess) trueRelations.push(`${sN} is less than ${lN}`);
  if(hasLarger&&hasSmaller&&hasMore) trueRelations.push(`${lN} is more than ${sN}`);
  if(hasLarger&&hasSmaller&&hasLess) trueRelations.push(`${sN} is less than ${lN}`);

  // part-whole relations if diff shown
  if(dN){
    if(hasSmaller&&hasDiff&&hasPlus&&hasEqual&&hasLarger) trueRelations.push(`${sN} plus ${dN} equals ${lN}`);
    if(hasSmaller&&hasPlus&&hasLarger) trueRelations.push(`${sN} plus ${dN} equals ${lN}`);
    if(hasLarger&&hasMinus&&hasSmaller&&hasEqual&&hasDiff) trueRelations.push(`${lN} minus ${sN} equals ${dN}`);
    if(hasLarger&&hasMinus&&hasSmaller) trueRelations.push(`${lN} minus ${sN} equals ${dN}`);
    if(hasLarger&&hasMinus&&hasDiff&&hasEqual&&hasSmaller) trueRelations.push(`${lN} minus ${dN} equals ${sN}`);
    if(hasLarger&&hasMinus&&hasDiff) trueRelations.push(`${lN} minus ${dN} equals ${sN}`);
    if(hasDiffWord||(hasDiff&&(hasMore||hasLess||hasEqual))) trueRelations.push(`${dN} is the difference`);
    if(r.includes('part')||r.includes('whole')) trueRelations.push('part-whole relation');
  }

  // Broad acceptance: if they name colors with directional language
  if(trueRelations.length===0){
    if(hasLarger&&hasMore) return{valid:true,relation:`${lN} is more`};
    if(hasSmaller&&hasLess) return{valid:true,relation:`${sN} is less`};
    if(hasMore&&hasLarger) return{valid:true,relation:`${lN} is more`};
    if(hasLess&&hasSmaller) return{valid:true,relation:`${sN} is less`};
    if(dN&&(hasDiffWord||hasDiff)) return{valid:true,relation:`${dN} is the difference`};
    if(dN&&hasPlus&&(hasSmaller||hasLarger)) return{valid:true,relation:`addition relation`};
    if(dN&&hasMinus&&(hasSmaller||hasLarger)) return{valid:true,relation:`subtraction relation`};
    return{valid:false,relation:null};
  }

  return{valid:true,relation:trueRelations[0]};
}

function isDuplicateRelation(newRel, found){
  const n=newRel.toLowerCase();
  return found.some(f=>f.toLowerCase()===n||
    (f.toLowerCase().includes(n.slice(0,8))&&n.slice(0,8).length>4));
}

// ── Decomp bar renderers — orientation-aware, with IDs for animation ──────────
function decompBarH(hex, name, w, id, isUnknown=false, faded=false){
  const bg=faded?hex+'44':hex;
  const col=faded?'#777':tc(hex);
  const bdr=faded?'2px dashed #9B9591':'none';
  const content=isUnknown
    ?`<span style="font-family:'DM Serif Display',serif;font-size:24px;font-style:italic;color:${col}">?</span>`
    :`<span style="font-size:12px;font-weight:600;text-transform:capitalize;color:${col}">${name}</span>`;
  return`<div id="${id}" class="decomp-bar" style="width:${w}px;height:${BH}px;background:${bg};border-radius:6px;border:${bdr};display:flex;align-items:center;justify-content:center;flex-shrink:0">${content}</div>`;
}

function decompBarV(hex, name, h, id, isUnknown=false, faded=false){
  const bg=faded?hex+'44':hex;
  const col=faded?'#777':tc(hex);
  const bdr=faded?'2px dashed #9B9591':'none';
  const content=isUnknown
    ?`<span style="font-family:'DM Serif Display',serif;font-size:24px;font-style:italic;color:${col}">?</span>`
    :`<span style="font-size:12px;font-weight:600;text-transform:capitalize;color:${col}">${name}</span>`;
  return`<div id="${id}" class="decomp-bar" style="width:${BW}px;height:${h}px;background:${bg};border-radius:6px;border:${bdr};display:flex;align-items:center;justify-content:center;flex-shrink:0">${content}</div>`;
}

// Renders the full decomp comparison — all three bars — with IDs
function renderDecompFull(m, hideSmallerAfterRender=false, hideDiffAfterRender=false){
  const{larger,smaller,diff}=m;
  const lN=larger.color.name,sN=smaller.color.name,dN=diff.color.name;
  const isH=m.orientation!=='v';

  if(isH){
    const lBar=decompBarH(larger.color.hex,lN,larger.w,'dbar-large');
    const sBar=decompBarH(smaller.color.hex,sN,smaller.w,'dbar-small');
    const dBar=decompBarH(diff.color.hex,dN,diff.w,'dbar-diff',false,true);
    const lines=`<div style="position:absolute;left:${smaller.w}px;top:0;bottom:0;border-left:2px dashed #6B6560;pointer-events:none"></div>
      <div style="position:absolute;left:${larger.w}px;top:0;bottom:0;border-left:2px dashed #6B6560;pointer-events:none"></div>`;
    return`<div style="position:relative;display:inline-block">${lines}
      <div style="display:flex;flex-direction:column;align-items:flex-start;gap:8px">
        ${lBar}
        <div style="display:flex;flex-direction:row;gap:0">${sBar}${dBar}</div>
      </div></div>`;
  } else {
    const lBar=decompBarV(larger.color.hex,lN,larger.h,'dbar-large');
    const dBar=decompBarV(diff.color.hex,dN,diff.h,'dbar-diff',false,true);
    const sBar=decompBarV(smaller.color.hex,sN,smaller.h,'dbar-small');
    const lines=`<div style="position:absolute;top:0;left:0;right:0;border-top:2px dashed #6B6560;pointer-events:none"></div>
      <div style="position:absolute;top:${diff.h}px;left:0;right:0;border-top:2px dashed #6B6560;pointer-events:none"></div>`;
    return`<div style="display:flex;flex-direction:row;align-items:flex-start;gap:16px">
      ${lBar}
      <div style="position:relative">${lines}
        <div style="display:flex;flex-direction:column;gap:0">${dBar}${sBar}</div>
      </div></div>`;
  }
}

function showDecompStep(step){
  S.decompStep=step;
  setProgress(32);
  const m=S.decompModel;
  const lN=m.larger.color.name,sN=m.smaller.color.name,dN=m.diff.color.name;

  let audio='',short='',question='';

  if(step===0){
    audio=`Look at this picture. You can see three bars — the ${lN} bar, the ${sN} bar, and the ${dN} difference. Watch carefully as I show you how they are related.`;
    short=`Three bars: ${lN}, ${sN}, and the ${dN} difference.`;
    question=`What is the relation between ${lN} and ${sN}?`;
  } else if(step===1){
    audio=`The ${sN} bar has been removed. Look at what remains — the ${dN} difference lines up with part of the ${lN} bar. The ${dN} difference is equal to that part of ${lN}. What does ${dN} equal?`;
    short=`${sN} removed. ${dN} equals part of ${lN}.`;
    question=`What does the ${dN} bar equal?`;
  } else if(step===2){
    audio=`Now the ${dN} difference is removed. The ${lN} bar without the difference equals the ${sN} bar. What equals ${sN}?`;
    short=`${dN} removed. ${lN} without the difference equals ${sN}.`;
    question=`What equals ${sN}?`;
  }

  render(
    `<div class="canvas" id="decompCanvas">${renderDecompFull(m)}</div>
     <div class="key-point">${ttsEnabled?aBtn():''}<span>${dt(audio,short)}</span></div>
     <div class="key-point neutral" style="font-weight:500">${question}</div>`,
    hInput('dIn','Type or speak your answer...','submitDecomp')
  );

  // After render, trigger fade-out of the bar being removed in this step
  if(step===0){
    // No fade on step 0 — full picture shown fresh
  } else if(step===1){
    // Fade out the smaller bar (it was just removed)
    setTimeout(()=>{
      const el=document.getElementById('dbar-small');
      if(el) el.classList.add('faded');
    },50);
  } else if(step===2){
    // Diff is removed, smaller is restored — fade diff only
    setTimeout(()=>{
      const el=document.getElementById('dbar-diff');
      if(el) el.classList.add('faded');
    },50);
  }

  speak(audio+' '+question,()=>focus('dIn'));
  if(!ttsEnabled)focus('dIn');
}

function submitDecomp(){
  const el=document.getElementById('dIn');if(!el)return;
  const r=el.value.toLowerCase().trim();if(!r)return;
  const m=S.decompModel;
  const lN=m.larger.color.name,sN=m.smaller.color.name,dN=m.diff.color.name;
  const step=S.decompStep;

  let accepted=[],correction='',correctionKey='',q='';
  if(step===0){
    accepted=['more','less','greater','larger','smaller','compare','different','not equal'];
    correction=`Look at the sizes. Which bar is more — which is less?`;
    correctionKey=`Which bar is more, which is less?`;
    q=`What is the relation between ${lN} and ${sN}?`;
  } else if(step===1){
    accepted=[`part of ${lN}`,`part of the ${lN}`,`${lN} minus ${sN}`,`${lN} without ${sN}`,'part','that part',lN];
    correction=`The ${dN} bar lines up with part of the ${lN} bar. The ${dN} difference equals that part of ${lN}.`;
    correctionKey=`${dN} equals part of ${lN}.`;
    q=`What does the ${dN} bar equal?`;
  } else {
    accepted=[`${lN} minus ${dN}`,`${lN} without ${dN}`,`${lN} takeaway ${dN}`,`${lN} minus the difference`,`${lN} without the difference`,lN];
    correction=`Take the ${lN} bar and remove the difference. What is left is the ${sN} bar. Say: ${lN} without the difference equals ${sN}.`;
    correctionKey=`${lN} without the difference equals ${sN}.`;
    q=`What equals ${sN}?`;
  }

  const ok=accepted.some(a=>r.includes(a.toLowerCase()));

  if(ok){
    recordResp('decomp',true);
    if(step===0){
      // Animate smaller bar fading, then go to step 1
      const smallEl=document.getElementById('dbar-small');
      if(smallEl){
        smallEl.classList.add('fading');
        setTimeout(()=>showDecompStep(1),480);
      } else { showDecompStep(1); }
    } else if(step===1){
      // Animate diff bar fading out, smaller bar fading back in, then go to step 2
      const diffEl=document.getElementById('dbar-diff');
      const smallEl=document.getElementById('dbar-small');
      if(diffEl) diffEl.classList.add('fading');
      // Restore smaller bar by removing faded class — CSS transition handles the fade-in
      if(smallEl){
        smallEl.classList.remove('faded');
        smallEl.classList.remove('fading');
      }
      setTimeout(()=>showDecompStep(2),480);
    } else {
      showDecompSummary();
    }
  } else {
    recordResp('decomp',false);
    // Show correction, re-render same step visual
    render(
      `<div class="canvas" id="decompCanvas">${renderDecompFull(m)}</div>
       <div class="key-point correction">${ttsEnabled?aBtn():''}<span>${dt(correction,correctionKey)}</span></div>
       <div class="key-point neutral" style="font-weight:500">${q}</div>`,
      hInput('dIn','Type or speak your answer...','submitDecomp')
    );
    // Re-apply faded state for current step
    setTimeout(()=>{
      if(step===1){ const e=document.getElementById('dbar-small'); if(e) e.classList.add('faded'); }
      if(step===2){ const e=document.getElementById('dbar-diff'); if(e) e.classList.add('faded'); }
    },50);
    speak(correction+' '+q,()=>focus('dIn'));
    if(!ttsEnabled)focus('dIn');
  }
}

function showFullNaming(){
  const n=S.currentNaming;
  const hints={
    larger:`Say: ${n.smaller} plus ${n.diff} equals...`,
    smaller:`Say: ${n.larger} minus ${n.diff} equals...`,
    diff:`Say: ${n.larger} minus ${n.smaller} equals...`,
  };
  render(
    `<div class="canvas">${renderComparison(S.currentModel)}</div>
     <div class="key-point neutral" style="font-weight:500">What equals the unknown?</div>`,
    hInput('nIn',hints[n.unknownRole],'submitNaming')
  );
  speak('What equals the unknown? Name the full relation.',()=>focus('nIn'));
  if(!ttsEnabled)focus('nIn');
}

function checkNaming(r,n){
  const hasPlus=r.includes('plus')||r.includes('and')||r.includes('together');
  const hasMinus=r.includes('minus')||r.includes('without')||r.includes('takeaway')||r.includes('take away');
  if(n.unknownRole==='larger'){
    if(cmatch(r,n.smaller)&&cmatch(r,n.diff)&&hasPlus) return 'correct';
    if(hasMinus) return 'wrong_op';
    return 'unclear';
  }
  if(n.unknownRole==='smaller'){
    if(cmatch(r,n.larger)&&cmatch(r,n.diff)&&hasMinus) return 'correct';
    if(hasPlus) return 'wrong_op';
    return 'unclear';
  }
  if(n.unknownRole==='diff'){
    if(cmatch(r,n.larger)&&cmatch(r,n.smaller)&&hasMinus) return 'correct';
    if(hasPlus) return 'wrong_op';
    return 'unclear';
  }
  return 'unclear';
}

function submitNaming(){
  const el=document.getElementById('nIn');if(!el)return;
  const r=el.value.trim();if(!r)return;
  const res=checkNaming(r.toLowerCase(),S.currentNaming);

    recordResp('naming',true);
    updateRoleScaffold(true);
    S.namingStep++;
    if(S.namingStep>=S.totalNaming){showBridgeIntro();return;}
    const roles=['larger','smaller','diff'];

    S.currentModel=m;
    S.currentNaming={larger:m.larger.color.name,smaller:m.smaller.color.name,diff:m.diff.color.name,unknownRole:role};
    startTimer();showNamingItem();return;
  }
  recordResp('naming',false);
  let audio='',short='';
  if(res==='wrong_op'){
    updateRoleScaffold(false);
    if(n.unknownRole==='larger'){
      audio=`The unknown is the larger bar. To find it, add the smaller bar and the difference. Say: ${n.smaller} plus ${n.diff} equals...`;
      short=`Unknown is larger — use plus. ${n.smaller} plus ${n.diff} equals...`;
    } else {
      audio=`The unknown is the ${n.unknownRole==='smaller'?'smaller bar':'difference'}. To find it, subtract. Say: ${n.larger} minus ${n.unknownRole==='smaller'?n.diff:n.smaller} equals...`;
      short=`Unknown is ${n.unknownRole} — use minus.`;
    }
  } else {
    updateColorScaffold(false);
    audio=`Look at the shape with the question mark. Name the relation that tells you what it equals.`;
    short=`Name the relation for the shape with the ?`;
  }
  render(
    `<div class="canvas">${renderComparison(S.currentModel)}</div>
     <div class="key-point correction">${ttsEnabled?aBtn():''}<span>${dt(audio,short)}</span></div>`,
    hInput('nIn','Name the relation...','submitNaming')
  );
  speak(audio,()=>focus('nIn'));
  if(!ttsEnabled)focus('nIn');
}

    `<div class="completion">
       <div style="font-size:44px;margin-bottom:12px">◈</div>
       <h2>Comparisons &amp; Differences</h2>
       <p>You can identify comparison relations and name them precisely.<br><br>
          A comparison is a part-whole relation in disguise.<br><br>
          <em>smaller plus difference equals larger</em><br>
          <em>larger minus smaller equals difference</em><br>
          <em>larger minus difference equals smaller</em></p>
     </div>`,``
  );
  speak('Well done. You can identify comparison relations and name them precisely.');
}
