<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Problems — Fluency</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root{--bg:#F7F4EF;--surface:#FFFFFF;--border:#E2DDD6;--text-primary:#1A1714;--text-secondary:#6B6560;--text-muted:#9B9591;--accent:#2D6A4F;--accent-light:#EAF4EF;--accent-warm:#C17D3C;--accent-warm-light:#FBF0E4;--error:#C0392B;--radius:12px;--radius-lg:20px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
  .app{width:100%;max-width:820px;display:flex;flex-direction:column;gap:14px;}
  .header{display:flex;align-items:center;gap:12px;}
  .lesson-label{font-family:'DM Serif Display',serif;font-size:22px;letter-spacing:-0.5px;}
  .phase-label{font-size:12px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;flex:1;}

  /* Timer */
  .timer-ring{position:relative;width:56px;height:56px;flex-shrink:0;}
  .timer-ring svg{transform:rotate(-90deg);}
  .timer-ring .bg{fill:none;stroke:var(--border);stroke-width:5;}
  .timer-ring .fg{fill:none;stroke:var(--accent);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke 0.3s;}
  .timer-ring .fg.urgent{stroke:var(--error);}
  .timer-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:17px;}

  /* Problem card */
  .problem-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 18px;font-size:14px;line-height:1.6;color:var(--text-primary);}
  .problem-card .pb-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}

  /* Canvas sections */
  .dc-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;overflow:visible;}
  .dc-section .dc-step-label{font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;}
  .dc-toolbar{display:flex;gap:6px;align-items:center;margin-top:8px;flex-wrap:wrap;}
  .dc-tool-btn{padding:5px 10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;color:var(--text-secondary);cursor:pointer;}
  .dc-tool-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}

  /* Word bank */
  .instruct-word-bank{width:100%;border:2px solid var(--text-primary);border-radius:var(--radius);padding:8px;display:flex;flex-direction:column;gap:5px;background:var(--surface);}
  .wb-group{display:flex;flex-direction:column;gap:4px;}
  .wb-row{display:flex;gap:3px;}
  .wb-div{height:1px;background:var(--border);margin:3px 0;}
  .wb-btn{width:100%;padding:8px 10px;border-radius:7px;border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--text-primary);cursor:pointer;transition:all 0.1s;text-align:center;}
  .wb-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
  .wb-btn:active{transform:scale(0.96);}

  /* Relation strip */
  .relation-strip{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;min-height:44px;}
  .token{background:var(--accent-light);border:1px solid #B8DAC8;border-radius:5px;padding:3px 9px;font-size:13px;font-weight:600;color:var(--accent);}
  .token.unk{background:#F0EAF8;border-color:#C9B8E8;color:#6C3483;}
  .strip-ph{font-size:13px;color:var(--text-muted);font-style:italic;}
  .strip-row{display:flex;gap:8px;margin-top:6px;}

  /* Buttons */
  .btn-continue{width:100%;padding:13px;border-radius:var(--radius);border:none;background:var(--accent);color:white;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;}
  .btn-continue:hover{background:#255C43;}
  .btn-continue:disabled{opacity:0.35;pointer-events:none;}
  .btn-back{padding:7px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--text-secondary);cursor:pointer;}
  .btn-back:hover{border-color:var(--accent-warm);color:var(--accent-warm);}
  .btn-sub{padding:7px 16px;border-radius:var(--radius);border:none;background:var(--accent);color:white;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
  .btn-sub:hover{background:#255C43;}
  .btn-sub:disabled{opacity:0.35;pointer-events:none;}

  /* Results */
  .results-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px 32px;text-align:center;}
  .results-card h2{font-family:'DM Serif Display',serif;font-size:24px;color:var(--accent);margin-bottom:16px;}
  .rate-row{display:flex;gap:20px;justify-content:center;margin-bottom:16px;}
  .rate-stat{text-align:center;}
  .rate-num{font-family:'DM Serif Display',serif;font-size:44px;}
  .rate-num.c{color:var(--accent);}
  .rate-num.e{color:var(--error);}
  .rate-sub{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
  .feedback-card{background:var(--accent-warm-light);border:1px solid #E8C99A;border-radius:var(--radius);padding:14px 18px;font-size:14px;line-height:1.6;margin-bottom:10px;}
  .feedback-card.ok{background:var(--accent-light);border-color:#B8DAC8;}

  .nav-links{display:flex;gap:8px;margin-top:8px;}
  .nav-link{flex:1;padding:11px;border-radius:var(--radius);border:2px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--text-primary);text-decoration:none;text-align:center;display:block;}
  .nav-link:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
  .nav-link.primary{background:var(--accent);border-color:var(--accent);color:white;}
  .intro-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px 32px;}
  .intro-card h2{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:10px;}
  .intro-card p{font-size:14px;line-height:1.6;color:var(--text-secondary);margin-bottom:6px;}
  .start-btn{width:100%;padding:14px;border-radius:var(--radius);border:none;background:var(--accent);color:white;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;cursor:pointer;margin-top:14px;}
  .start-btn:hover{background:#255C43;}

  @keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
  .fu{animation:fadeUp 0.2s ease;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="lesson-label">Word Problems — Fluency</span>
    <span class="phase-label" id="phaseLabel">Practice</span>
  </div>
  <div id="main"></div>
</div>
<script>
// ── Config ────────────────────────────────────────────────────────────────────
const CFG={id:9,storageKey:'fluency_unit5_sessions',chartHref:'chart.html',lessonHref:'lesson-unit5.html'};

// ── Storage ───────────────────────────────────────────────────────────────────
function loadSessions(){try{const r=localStorage.getItem(CFG.storageKey);return r?JSON.parse(r):[];}catch(e){return[];}}
function saveSession(s){try{const e=loadSessions();e.push(s);localStorage.setItem(CFG.storageKey,JSON.stringify(e));}catch(e){}}

// ── Colors ────────────────────────────────────────────────────────────────────
const COLORS=[{name:'blue',hex:'#1B6CA8'},{name:'orange',hex:'#D4600A'},{name:'green',hex:'#2D6A4F'},{name:'red',hex:'#C0392B'},{name:'purple',hex:'#6C3483'},{name:'teal',hex:'#0E7E7E'}];
function tc(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(0.299*r+0.587*g+0.114*b)/255>0.55?'#1A1714':'#FFFFFF';}
function shuffle(a){const arr=[...a];for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
const FRAC_NAMES=['half','third','fourth','fifth'];
function fracName(n){return FRAC_NAMES[n-2]||`${n}th`;}
const BH=62,GAP=6,SNAP=10,CVW=380;

// ── Problems ───────────────────────────────────────────────────────────────────
const PROBLEMS5=[
  {
    id:3,phase:'practice',
    text:`A jar holds red marbles and blue marbles. The whole jar is then split equally in half — one half is the unknown.`,
    step1Labels:['whole jar','red marbles','blue marbles'],
    step2Labels:['whole jar','one half'],
    bridge:'whole jar',denominator:2,
    correct:['one','half','of','whole jar','equals','unknown'],
    ops:['one','half','third','fourth','of','plus','minus','equals','unknown'],
  },
  {
    id:4,phase:'practice',
    text:`A bag has green chips and purple chips. The whole bag is divided into three equal portions. One portion is the unknown.`,
    step1Labels:['whole bag','green chips','purple chips'],
    step2Labels:['whole bag','one portion'],
    bridge:'whole bag',denominator:3,
    correct:['one','third','of','whole bag','equals','unknown'],
    ops:['one','half','third','fourth','of','plus','minus','equals','unknown'],
  },
  {
    id:5,phase:'practice',
    text:`A road has a paved section and an unpaved section. The whole road is split into four equal segments. One segment is the unknown.`,
    step1Labels:['whole road','paved section','unpaved section'],
    step2Labels:['whole road','one segment'],
    bridge:'whole road',denominator:4,
    correct:['one','fourth','of','whole road','equals','unknown'],
    ops:['one','half','third','fourth','of','plus','minus','equals','unknown'],
  },
  {
    id:6,phase:'practice',
    text:`A shelf holds fiction books and science books. The entire shelf is split equally in half. One half is unknown.`,
    step1Labels:['whole shelf','fiction books','science books'],
    step2Labels:['whole shelf','one half'],
    bridge:'whole shelf',denominator:2,
    correct:['one','half','of','whole shelf','equals','unknown'],
    ops:['one','half','third','fourth','of','plus','minus','equals','unknown'],
  },
  {
    id:7,phase:'practice',
    text:`A park has a grass area and a path area. The whole park is divided into three equal zones. One zone is the unknown.`,
    step1Labels:['whole park','grass area','path area'],
    step2Labels:['whole park','one zone'],
    bridge:'whole park',denominator:3,
    correct:['one','third','of','whole park','equals','unknown'],
    ops:['one','half','third','fourth','of','plus','minus','equals','unknown'],
  },
  {
    id:8,phase:'practice',
    text:`A collection has old and new items. The whole collection is split into four equal groups. One group is the unknown.`,
    step1Labels:['whole collection','old items','new items'],
    step2Labels:['whole collection','one group'],
    bridge:'whole collection',denominator:4,
    correct:['one','fourth','of','whole collection','equals','unknown'],
    ops:['one','half','third','fourth','of','plus','minus','equals','unknown'],
  },
];

function pickItem(){return PROBLEMS5[Math.floor(Math.random()*PROBLEMS5.length)];}

// ── Canvas ────────────────────────────────────────────────────────────────────
let DC1,DC2;

function createDC(){return{bars:[],drawing:false,drawStart:0,ghostX:0,ghostW:0,draggingBarId:null,dragOffsetX:0,colorIdx:0,nextId:0,labelPending:null};}

function snap(v){return Math.round(v/SNAP)*SNAP;}
function snapW(dc,w,startX){
  const rEdge=startX+w;
  for(const b of dc.bars){
    if(Math.abs(rEdge-b.x)<8)return b.x-startX;
    if(Math.abs(rEdge-(b.x+b.w))<8)return(b.x+b.w)-startX;
  }
  return snap(w);
}
function canvasH(dc){return Math.max((dc.bars.length+(dc.drawing?1:0))*(BH+GAP)+8,100);}
function ghostDiv(dc){
  if(!dc.drawing||dc.ghostW<10)return'';
  const col=COLORS[dc.colorIdx];
  const y=dc.bars.length*(BH+GAP);
  return`<div style="position:absolute;left:${dc.ghostX}px;top:${y}px;width:${dc.ghostW}px;height:${BH}px;background:${col.hex};opacity:0.45;border-radius:6px;pointer-events:none"></div>`;
}

function barDivDC(dc,b,i,canvasId){
  const col=COLORS[b.colorIdx];
  const textColor=tc(col.hex);
  const y=i*(BH+GAP);
  const sel=b.id===dc.labelPending;
  const label=b.label
    ?`<span style="font-size:9px;font-weight:600;color:${textColor};text-transform:capitalize;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:${b.w-12}px">${b.label}</span>`
    :`<span style="font-size:10px;color:${textColor};opacity:0.6;font-style:italic">?</span>`;
  const dcRef=canvasId==='dcCanvas1'?'DC1':'DC2';
  return`<div id="bar_${canvasId}_${b.id}" data-barid="${b.id}" style="position:absolute;left:${b.x}px;top:${y}px;width:${b.w}px;height:${BH}px;background:${col.hex};border-radius:6px;${sel?`outline:3px solid ${col.hex};outline-offset:2px;`:''}display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;box-sizing:border-box" onmousedown="dcBarDown(${dcRef},event,${b.id})" onclick="dcSelect(${dcRef},${b.id})">${label}</div>`;
}

function dcHtml(dc,canvasId){
  const dcRef=canvasId==='dcCanvas1'?'DC1':'DC2';
  const barsHtml=dc.bars.map((b,i)=>barDivDC(dc,b,i,canvasId)).join('');
  return`<div id="${canvasId}" style="position:relative;width:${CVW}px;height:${canvasH(dc)}px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:visible;cursor:crosshair"
    onmousedown="dcDown(${dcRef},'${canvasId}',event)"
    onmousemove="dcMove(${dcRef},'${canvasId}',event)"
    onmouseup="dcUp(${dcRef},'${canvasId}',event)"
    onmouseleave="dcUp(${dcRef},'${canvasId}',event)"
  >${barsHtml}${ghostDiv(dc)}</div>`;
}

function dcDown(dc,canvasId,e){
  if(e.target.dataset.barid)return;
  const rect=document.getElementById(canvasId).getBoundingClientRect();
  const x=snap(e.clientX-rect.left);
  dc.drawing=true;dc.drawStart=x;dc.ghostX=x;dc.ghostW=0;
  redraw();
}
function dcMove(dc,canvasId,e){
  if(dc.draggingBarId!==null){
    const rect=document.getElementById(canvasId).getBoundingClientRect();
    let nx=snap(e.clientX-rect.left-dc.dragOffsetX);
    nx=Math.max(0,Math.min(nx,CVW-40));
    const b=dc.bars.find(b=>b.id===dc.draggingBarId);
    if(b)b.x=nx;
    redraw();return;
  }
  if(!dc.drawing)return;
  const rect=document.getElementById(canvasId).getBoundingClientRect();
  const x=snap(e.clientX-rect.left);
  const rw=x-dc.drawStart;
  if(rw>0){dc.ghostX=dc.drawStart;dc.ghostW=Math.min(snapW(dc,rw,dc.drawStart),CVW-dc.ghostX);}
  else{dc.ghostX=snap(x);dc.ghostW=Math.min(snap(dc.drawStart-x),CVW-dc.ghostX);}
  dc.ghostW=Math.max(0,dc.ghostW);
  redraw();
}
function dcUp(dc,canvasId,e){
  if(dc.draggingBarId!==null){dc.draggingBarId=null;return;}
  if(!dc.drawing)return;
  dc.drawing=false;
  if(dc.ghostW>=40){
    const id=dc.nextId++;
    dc.bars.push({id,colorIdx:dc.colorIdx,x:dc.ghostX,w:dc.ghostW,label:'',selected:false});
    dc.labelPending=id;
  }
  dc.ghostW=0;
  redraw();
}
function dcBarDown(dc,e,id){
  e.stopPropagation();
  const canvasId=dc===DC1?'dcCanvas1':'dcCanvas2';
  const rect=document.getElementById(canvasId).getBoundingClientRect();
  const b=dc.bars.find(b=>b.id===id);
  if(!b)return;
  dc.draggingBarId=id;
  dc.dragOffsetX=e.clientX-rect.left-b.x;
}
function dcSelect(dc,id){dc.labelPending=id;redraw();}
function dcSetColor(dc,idx){dc.colorIdx=idx;redraw();}
function dcAssignLabel(dc,label){
  if(dc.labelPending!==null){
    const b=dc.bars.find(b=>b.id===dc.labelPending);
    if(b)b.label=label;
    dc.labelPending=null;
  }
  redraw();
}
function dcUndo(dc){dc.bars.pop();dc.labelPending=null;redraw();}
function dcReset(dc){dc.bars=[];dc.labelPending=null;dc.nextId=0;redraw();}

function colorPaletteDC(dc,dcRef){
  return`<div style="display:flex;gap:6px;align-items:center;margin-top:6px">
    ${COLORS.slice(0,5).map((c,i)=>`<div onclick="dcSetColor(${dcRef},${i})" style="width:22px;height:22px;border-radius:50%;background:${c.hex};cursor:pointer;outline:${i===dc.colorIdx?'3px solid var(--text-primary)':'2px solid transparent'};outline-offset:2px"></div>`).join('')}
  </div>`;
}

function labelPanelDC(dc,dcRef,labels){
  if(dc.labelPending===null)return'';
  return`<div style="margin-top:5px;padding:6px 8px;background:var(--accent-light);border:1px solid #B8DAC8;border-radius:var(--radius)">
    <div style="font-size:10px;font-weight:600;color:var(--accent);margin-bottom:4px">Label this bar</div>
    <div style="display:flex;flex-wrap:wrap;gap:4px">
      ${labels.map(l=>`<button onclick="dcAssignLabel(${dcRef},'${l.replace(/'/g,"\\'").replace(/"/g,'&quot;')}');redraw()" style="padding:4px 8px;border-radius:var(--radius);border:1px solid var(--accent);background:white;color:var(--accent);font-size:11px;font-weight:600;cursor:pointer">${l}</button>`).join('')}
    </div>
  </div>`;
}

// ── Timer ─────────────────────────────────────────────────────────────────────
const DUR=90;
const CIRC=2*Math.PI*24;
function tRing(t){
  const off=CIRC*(1-t/DUR);
  return`<div class="timer-ring"><svg width="56" height="56" viewBox="0 0 56 56"><circle class="bg" cx="28" cy="28" r="24"/><circle class="fg${t<=15?' urgent':''}" cx="28" cy="28" r="24" stroke-dasharray="${CIRC.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/></svg><div class="timer-label">${t}</div></div>`;
}

// ── State ─────────────────────────────────────────────────────────────────────
const S={phase:'intro',t:DUR,timer:null,cor:0,err:0,item:null,asm:[],start:null,errors:[],ci:0,cItem:null,cAsm:[],cFb:null,drawnOk:false};
function render(h){document.getElementById('main').innerHTML=h;}
function setPhase(l){document.getElementById('phaseLabel').textContent=l;}

// ── Check ─────────────────────────────────────────────────────────────────────
function checkModels(){
  if(DC1.bars.length<3)return{ok:false,fb:`Step 1 needs at least 3 bars.`};
  if(DC2.bars.length<2)return{ok:false,fb:`Step 2 needs at least 2 bars.`};
  return{ok:true,fb:null};
}

function checkRelation(asm,item){
  const s=asm.join(' ');
  const cor=item.correct.join(' ');
  if(s===cor)return{ok:true,fb:null};
  const spokenFrac=FRAC_NAMES.find(f=>asm.includes(f));
  if(spokenFrac&&spokenFrac!==fracName(item.denominator))return{ok:false,fb:`Count the equal parts — there are ${item.denominator}. Use "${fracName(item.denominator)}".`};
  if(!asm.includes('of'))return{ok:false,fb:`Use "of": one ${fracName(item.denominator)} of ${item.bridge} equals unknown.`};
  return{ok:false,fb:`Try: ${cor}`};
}

// ── Drill ─────────────────────────────────────────────────────────────────────
function showIntro(){
  S.phase='intro';setPhase('Practice');
  render(`<div class="intro-card fu">
    <h2>Word Problems — Fluency</h2>
    <p>You will see word problems for <strong>90 seconds</strong>.</p>
    <p>For each problem: draw a two-step bar model (step 1: part-whole, step 2: fractional), then name the relation for the unknown.</p>
    <p style="color:var(--accent);font-weight:600">Go as fast as you accurately can.</p>
    <button class="start-btn" onclick="startDrill()">Start</button>
  </div>`);
}

function startDrill(){
  S.phase='drill';S.cor=0;S.err=0;S.t=DUR;
  S.start=new Date().toISOString();S.errors=[];
  setPhase('Practice');
  DC1=createDC();DC2=createDC();
  S.asm=[];S.drawnOk=false;
  nextItem();
  S.timer=setInterval(()=>{S.t--;updateT();if(S.t<=0)endDrill();},1000);
}

function nextItem(){
  S.item=pickItem();
  DC1=createDC();DC2=createDC();
  S.asm=[];S.drawnOk=false;
  draw();
}

function draw(){
  const item=S.item;
  const canDone=DC1.bars.length>=3&&DC2.bars.length>=2;
  render(`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      ${tRing(S.t)}
      <div style="flex:1;font-size:14px;font-weight:600;color:var(--text-secondary)">Draw both models, then name the relation</div>
    </div>
    <div class="problem-card fu">
      <div class="pb-label">Word Problem</div>
      ${item.text}
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start">
      <div class="dc-section" style="flex:1;min-width:280px">
        <div class="dc-step-label">Step 1: Part-Whole</div>
        ${dcHtml(DC1,'dcCanvas1')}
        ${colorPaletteDC(DC1,'DC1')}
        ${labelPanelDC(DC1,'DC1',item.step1Labels)}
        <div class="dc-toolbar">
          <button class="dc-tool-btn" onclick="dcUndo(DC1)">Undo</button>
          <button class="dc-tool-btn" onclick="dcReset(DC1)">Reset</button>
          <span style="font-size:11px;color:var(--text-muted)">${DC1.bars.length} bars</span>
        </div>
      </div>
      <div class="dc-section" style="flex:1;min-width:280px">
        <div class="dc-step-label">Step 2: Fractional</div>
        ${dcHtml(DC2,'dcCanvas2')}
        ${colorPaletteDC(DC2,'DC2')}
        ${labelPanelDC(DC2,'DC2',item.step2Labels)}
        <div class="dc-toolbar">
          <button class="dc-tool-btn" onclick="dcUndo(DC2)">Undo</button>
          <button class="dc-tool-btn" onclick="dcReset(DC2)">Reset</button>
          <span style="font-size:11px;color:var(--text-muted)">${DC2.bars.length} bars</span>
        </div>
      </div>
    </div>
    ${wbAndStrip(item)}
    <button class="btn-continue" onclick="subDrill()" ${canDone&&S.asm.length>=2?'':'disabled'}>Submit</button>
  `);
}

function wbAndStrip(item){
  const ops=item.ops||['one','half','third','fourth','of','plus','minus','equals','unknown'];
  const labelBtns=item.step1Labels.concat(item.step2Labels.filter(l=>!item.step1Labels.includes(l)))
    .map(l=>`<button class="wb-btn" style="padding:6px 8px;font-size:11px;text-align:center" onclick="addT('${l.replace(/'/g,"\\'")}')">${l}</button>`).join('');
  const opBtns=ops.map(o=>`<button class="wb-btn" style="padding:6px 8px;font-size:11px;text-align:center" onclick="addT('${o}')">${o}</button>`).join('');
  const tokens=S.asm.length?S.asm.map(t=>`<span class="token${t==='unknown'?' unk':''}">${t}</span>`).join(''):`<span class="strip-ph">Name the relation...</span>`;
  return`<div class="instruct-word-bank" style="margin-top:4px">
    <div class="wb-group" style="display:flex;flex-direction:row;flex-wrap:wrap;gap:3px">${labelBtns}</div>
    <div class="wb-div"></div>
    <div class="wb-group" style="display:flex;flex-direction:row;flex-wrap:wrap;gap:3px">${opBtns}</div>
  </div>
  <div class="relation-strip" style="margin-top:6px">${tokens}</div>
  <div class="strip-row" style="margin-top:4px">
    <button class="btn-back" onclick="back()">← Back</button>
  </div>`;
}

function redraw(){draw();}

function updateT(){
  const r=document.querySelector('.timer-ring');
  if(!r)return;
  const off=CIRC*(1-S.t/DUR);
  const fg=r.querySelector('.fg');
  const lb=r.querySelector('.timer-label');
  if(fg){fg.setAttribute('stroke-dashoffset',off.toFixed(1));if(S.t<=15)fg.classList.add('urgent');}
  if(lb)lb.textContent=S.t;
}

function addT(w){S.asm.push(w);draw();}
function back(){S.asm.pop();draw();}

function subDrill(){
  if(S.phase!=='drill')return;
  const mc=checkModels();
  if(!mc.ok){S.err++;S.errors.push({item:S.item,fb:mc.fb});nextItem();return;}
  const rc=checkRelation(S.asm,S.item);
  if(rc.ok){S.cor++;}else{S.err++;S.errors.push({item:S.item,fb:rc.fb||`Try: ${S.item.correct.join(' ')}`});}
  nextItem();
}

function endDrill(){
  clearInterval(S.timer);S.phase='results';setPhase('Results');
  const cpm=Math.round(S.cor*(60/DUR));
  const epm=Math.round(S.err*(60/DUR));
  saveSession({date:S.start,lesson:CFG.id,phase:'fluency',corrects:S.cor,errors:S.err,cpm,epm,duration:DUR});
  render(`<div class="results-card fu"><h2>Session Complete</h2>
    <div class="rate-row">
      <div class="rate-stat"><div class="rate-num c">${cpm}</div><div class="rate-sub">Correct / min</div></div>
      <div style="font-size:26px;color:var(--text-muted);padding-top:10px">/</div>
      <div class="rate-stat"><div class="rate-num e">${epm}</div><div class="rate-sub">Errors / min</div></div>
    </div>
    <p style="color:var(--text-secondary);font-size:14px;margin-bottom:${S.errors.length?'16px':'0'}">${S.cor} correct and ${S.err} error${S.err!==1?'s':''} in ${DUR} seconds.</p>
    ${S.errors.length
      ?`<button class="btn-continue" onclick="startCorrections()">Review ${S.errors.length} missed item${S.errors.length!==1?'s':''} →</button>`
      :`<div class="nav-links"><a class="nav-link" href="${CFG.lessonHref}">Back to Lesson</a><a class="nav-link primary" href="${CFG.chartHref}">View Chart</a><a class="nav-link" onclick="location.reload()">Again</a></div>`}
  </div>`);
}

// ── Corrections ───────────────────────────────────────────────────────────────
function startCorrections(){S.phase='correction';S.ci=0;setPhase('Review');showC();}

function showC(){
  if(S.ci>=S.errors.length){doneC();return;}
  const e=S.errors[S.ci];S.cItem=e.item;S.cAsm=[];S.cFb=e.fb;
  drawC();
}

function drawC(){
  const item=S.cItem;
  const tokens=S.cAsm.length?S.cAsm.map(t=>`<span class="token${t==='unknown'?' unk':''}">${t}</span>`).join(''):`<span class="strip-ph">Name the relation...</span>`;
  const ops=item.ops||['one','half','third','fourth','of','plus','minus','equals','unknown'];
  const labelBtns=item.step1Labels.concat(item.step2Labels.filter(l=>!item.step1Labels.includes(l)))
    .map(l=>`<button class="wb-btn" style="padding:6px 8px;font-size:11px;text-align:center" onclick="addC('${l.replace(/'/g,"\\'")}')">${l}</button>`).join('');
  const opBtns=ops.map(o=>`<button class="wb-btn" style="padding:6px 8px;font-size:11px;text-align:center" onclick="addC('${o}')">${o}</button>`).join('');
  render(`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-size:13px;font-weight:600;color:var(--text-secondary)">Missed item ${S.ci+1} of ${S.errors.length}</span>
      <span style="font-size:12px;color:var(--text-muted)">${S.errors.length-S.ci} remaining</span>
    </div>
    <div class="feedback-card">${S.cFb}</div>
    <div class="problem-card fu">${item.text}</div>
    <div class="instruct-word-bank" style="margin-top:8px">
      <div class="wb-group" style="display:flex;flex-direction:row;flex-wrap:wrap;gap:3px">${labelBtns}</div>
      <div class="wb-div"></div>
      <div class="wb-group" style="display:flex;flex-direction:row;flex-wrap:wrap;gap:3px">${opBtns}</div>
    </div>
    <div class="relation-strip" style="margin-top:6px">${tokens}</div>
    <div class="strip-row" style="margin-top:4px">
      <button class="btn-back" onclick="backC()">← Back</button>
      <button class="btn-sub" onclick="subC()" ${S.cAsm.length<2?'disabled':''}>Submit</button>
    </div>
  `);
}

function addC(w){S.cAsm.push(w);drawC();}
function backC(){S.cAsm.pop();drawC();}

function subC(){
  const{ok,fb}=checkRelation(S.cAsm,S.cItem);
  if(ok){
    const rem=S.errors.length-S.ci-1;
    const ops=S.cItem.ops||['one','half','third','fourth','of','plus','minus','equals','unknown'];
    const labelBtns=S.cItem.step1Labels.concat(S.cItem.step2Labels.filter(l=>!S.cItem.step1Labels.includes(l)))
      .map(l=>`<button class="wb-btn" style="padding:6px 8px;font-size:11px;text-align:center" onclick="addC('${l.replace(/'/g,"\\'")}')">${l}</button>`).join('');
    const opBtns=ops.map(o=>`<button class="wb-btn" style="padding:6px 8px;font-size:11px;text-align:center" onclick="addC('${o}')">${o}</button>`).join('');
    render(`
      <div class="feedback-card ok fu">Correct — ${S.cItem.correct.join(' ')}</div>
      <div class="problem-card">${S.cItem.text}</div>
      <button class="btn-continue" style="margin-top:10px" onclick="nextC()">${rem>0?'Next missed item →':'Finish review'}</button>
    `);
  } else {
    S.cFb=fb||`Try: ${S.cItem.correct.join(' ')}`;
    S.cAsm=[];
    drawC();
  }
}

function nextC(){S.ci++;showC();}
function doneC(){
  setPhase('Complete');
  render(`<div class="results-card fu"><h2>Review Complete</h2>
    <p style="color:var(--text-secondary);font-size:14px;margin-bottom:16px">You worked through all ${S.errors.length} missed item${S.errors.length!==1?'s':''}.</p>
    <div class="nav-links">
      <a class="nav-link" onclick="location.reload()">Practice Again</a>
      <a class="nav-link primary" href="${CFG.chartHref}">View Chart</a>
      <a class="nav-link" href="${CFG.lessonHref}">Back to Lesson</a>
    </div>
  </div>`);
}

showIntro();
</script>
</body>
</html>
