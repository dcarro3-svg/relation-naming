<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Part-Whole Relations — Lesson Two</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root{
    --bg:#F7F4EF;--surface:#FFFFFF;--border:#E2DDD6;
    --text-primary:#1A1714;--text-secondary:#6B6560;--text-muted:#9B9591;
    --accent:#2D6A4F;--accent-light:#EAF4EF;
    --accent-warm:#C17D3C;--accent-warm-light:#FBF0E4;
    --radius:12px;--radius-lg:20px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-primary);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
  .app{width:100%;max-width:680px;display:flex;flex-direction:column;gap:20px;}
  .header{display:flex;align-items:center;gap:12px;}
  .lesson-label{font-family:'DM Serif Display',serif;font-size:26px;letter-spacing:-0.5px;}
  .phase-label{font-size:12px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;flex:1;}
  .tts-toggle{width:34px;height:34px;border-radius:50%;border:2px solid var(--border);
    background:var(--surface);display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:all 0.15s;flex-shrink:0;margin-left:auto;}
  .tts-toggle svg{width:16px;height:16px;fill:var(--text-muted);transition:fill 0.15s;}
  .tts-toggle.on{border-color:var(--accent);background:var(--accent-light);}
  .tts-toggle.on svg{fill:var(--accent);}
  .tts-toggle:hover{border-color:var(--accent);}
  .tts-toggle:hover svg{fill:var(--accent);}
  .progress-track{height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.5s ease;}

  /* Canvas */
  .canvas{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
    padding:44px 40px;display:flex;align-items:center;justify-content:center;
    min-height:200px;box-shadow:0 2px 12px rgba(0,0,0,0.04);animation:fadeUp 0.35s ease;overflow:visible;}

  /* Instruction text — always visible, letter-by-letter animation */
  .instruct-text{background:var(--accent-light);border:1px solid #B8DAC8;border-radius:var(--radius-lg);
    padding:18px 24px;font-size:16px;font-weight:400;color:var(--text-primary);
    line-height:1.7;animation:fadeUp 0.35s ease;display:flex;align-items:flex-start;gap:12px;}
  .instruct-text.correction{background:var(--accent-warm-light);border-color:#E8C99A;}
  .instruct-text.neutral{background:var(--surface);border-color:var(--border);}
  .instruct-text.bridge{background:#F0EAF8;border-color:#C9B8E8;}

  /* Letter-by-letter animation */
  .typed-text .char{opacity:0;animation:charFade 0.04s forwards;}
  @keyframes charFade{to{opacity:1;}}

  /* Audio replay button */
  .audio-indicator{width:32px;height:32px;border-radius:50%;background:var(--accent);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;
    transition:all 0.15s;border:none;margin-top:2px;}
  .audio-indicator:hover{background:#255C43;transform:scale(1.05);}
  .audio-indicator.speaking{background:var(--accent-warm);animation:pulse 1s infinite;}
  .audio-indicator svg{width:16px;height:16px;fill:white;}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

  /* Question prompt */
  .question-prompt{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:14px 18px;font-size:15px;font-weight:500;color:var(--text-primary);animation:fadeUp 0.2s ease;}

  /* Word bank — same design as fluency */
  .instruct-layout{display:flex;gap:12px;align-items:flex-start;}
  .instruct-model{flex:1;}
  .instruct-word-bank{width:136px;flex-shrink:0;border:2px solid var(--text-primary);
    border-radius:var(--radius);padding:8px 7px;display:flex;flex-direction:column;
    gap:5px;background:var(--surface);}
  .wb-group{display:flex;flex-direction:column;gap:3px;}
  .wb-row{display:flex;gap:3px;}
  .wb-div{height:1px;background:var(--border);margin:3px 0;}
  .wb-btn{width:100%;padding:7px 4px;border-radius:7px;border:1px solid var(--border);
    background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
    color:var(--text-primary);cursor:pointer;transition:all 0.1s;text-align:center;}
  .wb-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
  .wb-btn:active{transform:scale(0.96);}
  .wb-btn.selected{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
  .wb-btn.correct{border-color:var(--accent);background:var(--accent);color:white;}
  .wb-btn.incorrect{border-color:#C0392B;background:#FDF0F0;color:#C0392B;}

  /* Assembled relation strip */
  .relation-strip{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:10px 14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;min-height:44px;}
  .r-token{background:var(--accent-light);border:1px solid #B8DAC8;border-radius:5px;
    padding:3px 9px;font-size:13px;font-weight:600;color:var(--accent);}
  .r-token.unk{background:#F0EAF8;border-color:#C9B8E8;color:#6C3483;}
  .strip-ph{font-size:13px;color:var(--text-muted);font-style:italic;}
  .strip-row{display:flex;gap:8px;align-items:center;margin-top:6px;}
  .btn-back{padding:7px 12px;border-radius:var(--radius);border:1px solid var(--border);
    background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
    color:var(--text-secondary);cursor:pointer;}
  .btn-back:hover{border-color:var(--accent-warm);color:var(--accent-warm);}
  .btn-submit{padding:7px 16px;border-radius:var(--radius);border:none;background:var(--accent);
    color:white;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
  .btn-submit:hover{background:#255C43;}
  .btn-submit:disabled{opacity:0.35;pointer-events:none;}

  /* Response buttons (for review/ident phases) */
  .response-buttons{display:flex;gap:12px;flex-wrap:wrap;}
  .btn{flex:1;padding:15px 20px;border-radius:var(--radius);border:2px solid var(--border);
    background:var(--surface);font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;
    color:var(--text-primary);cursor:pointer;transition:all 0.15s;}
  .btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);transform:translateY(-1px);}
  .btn:active{transform:translateY(0);}
  .btn-continue{width:100%;padding:15px;border-radius:var(--radius);border:none;
    background:var(--accent);color:white;font-family:'DM Sans',sans-serif;
    font-size:16px;font-weight:600;cursor:pointer;transition:all 0.15s;}
  .btn-continue:hover{background:#255C43;transform:translateY(-1px);}

  /* Relations found tags */
  .relations-found{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
  .relation-tag{background:var(--accent-light);border:1px solid #B8DAC8;border-radius:20px;
    padding:4px 12px;font-size:13px;font-weight:500;color:var(--accent);}

  /* Bar styles */
  .bar-h{height:62px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .bar-label{font-size:12px;font-weight:600;text-transform:capitalize;letter-spacing:0.3px;}

  /* Completion */
  .completion{text-align:center;padding:44px 32px;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius-lg);box-shadow:0 2px 12px rgba(0,0,0,0.04);animation:fadeUp 0.5s ease;}
  .completion h2{font-family:'DM Serif Display',serif;font-size:26px;margin:12px 0 10px;color:var(--accent);}
  .completion p{color:var(--text-secondary);font-size:15px;line-height:1.6;max-width:380px;margin:0 auto;}

  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="lesson-label">Part-Whole Relations</span>
    <span class="phase-label" id="phaseLabel">Introduction</span>
    <button class="tts-toggle" id="ttsToggle" onclick="toggleTTS()" title="Toggle audio">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    </button>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div id="mainContent"></div>
  <div id="responseArea"></div>
</div>
<script>
// ═══════════════════════════════════════════════════════════════════════════════
// CONFIG — injected per lesson
// ═══════════════════════════════════════════════════════════════════════════════
const CFG = {
  id: 2,
  storageKey: 'fluency_l2_sessions',
  fluencyHref: 'fluency-l2.html',
  nextLessonHref: 'lesson-three.html',
  nextLessonLabel: 'Lesson Three →',
  completionTitle: 'Part-Whole Relations',
  completionSummary: 'A part-whole relation: two parts together equal the whole.<br><br><em>p1 plus p2 equals whole &nbsp;·&nbsp; whole minus p1 equals p2</em>',
};

// ═══════════════════════════════════════════════════════════════════════════════
// TTS
// ═══════════════════════════════════════════════════════════════════════════════
let ttsEnabled = true;
let currentUtterance = null;
let isSpeaking = false;

function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  const btn = document.getElementById('ttsToggle');
  if (btn) btn.classList.toggle('on', ttsEnabled);
  if (!ttsEnabled) window.speechSynthesis.cancel();
}

function speak(text, onEnd) {
  if (!ttsEnabled) { if (onEnd) onEnd(); return; }
  const clean = text.replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim();
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(clean);
  utt.rate = 0.92; utt.pitch = 1.0; utt.volume = 1.0;
  const voices = window.speechSynthesis.getVoices();
  const pref = voices.find(v => v.name.includes('Samantha')||v.name.includes('Karen')||v.name.includes('Daniel')||v.name.includes('Google')||v.lang==='en-US');
  if (pref) utt.voice = pref;
  utt.onstart = () => { isSpeaking=true; const b=document.getElementById('audioBtn'); if(b)b.classList.add('speaking'); };
  utt.onend = () => { isSpeaking=false; const b=document.getElementById('audioBtn'); if(b)b.classList.remove('speaking'); if(onEnd)onEnd(); };
  utt.onerror = () => { isSpeaking=false; if(onEnd)onEnd(); };
  currentUtterance = utt;
  window.speechSynthesis.speak(utt);
}

function replayAudio() { if (currentUtterance && ttsEnabled) speak(currentUtterance.text); }
function audioBtn() {
  return `<button class="audio-indicator" id="audioBtn" onclick="replayAudio()">
    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
  </button>`;
}

// ═══════════════════════════════════════════════════════════════════════════════
// LETTER-BY-LETTER TEXT ANIMATION
// ~33 chars/sec — fast enough to feel responsive, slow enough to feel intentional
// ═══════════════════════════════════════════════════════════════════════════════
const CHAR_DELAY_MS = 30; // 33 chars/sec

function animateText(text, containerId, onDone) {
  const el = document.getElementById(containerId);
  if (!el) { if (onDone) onDone(); return; }
  el.innerHTML = '';
  // Strip any HTML tags for animation, then show plain text char by char
  const plain = text.replace(/<br\s*\/?>/gi, '\n').replace(/<[^>]+>/g, '');
  const chars = plain.split('');
  chars.forEach((ch, i) => {
    const span = document.createElement('span');
    span.className = 'char';
    span.textContent = ch === '\n' ? '' : ch;
    if (ch === '\n') span.appendChild(document.createElement('br'));
    span.style.animationDelay = `${i * CHAR_DELAY_MS}ms`;
    el.appendChild(span);
  });
  if (onDone) setTimeout(onDone, chars.length * CHAR_DELAY_MS + 80);
}

// Wrap text content for animation — always shown regardless of TTS state
function typedText(text) {
  const safe = text.replace(/'/g,"&#39;").replace(/"/g,"&quot;");
  return `<span class="typed-text" id="animText_${Date.now()}" data-text="${safe}"></span>`;
}

// Show text with animation
function showAnimText(text, containerId, onDone) {
  animateText(text, containerId, onDone);
}

// ═══════════════════════════════════════════════════════════════════════════════
// COLORS & UTILITIES
// ═══════════════════════════════════════════════════════════════════════════════
const COLORS=[{name:'blue',hex:'#1B6CA8'},{name:'orange',hex:'#D4600A'},{name:'green',hex:'#2D6A4F'},
  {name:'red',hex:'#C0392B'},{name:'purple',hex:'#6C3483'},{name:'teal',hex:'#0E7E7E'},
  {name:'pink',hex:'#B03A6E'},{name:'navy',hex:'#1A3A5C'}];
const CF={blue:['blue','navy','teal'],navy:['navy','blue'],teal:['teal','blue','green'],
  green:['green','teal'],red:['red','pink'],pink:['pink','red'],orange:['orange'],purple:['purple']};
function fam(n){const f=CF[n]||[n];return COLORS.filter(c=>f.includes(c.name)||(CF[c.name]||[c.name]).includes(n)).map(c=>c.name);}
function randColor(ex=[]){const ef=ex.flatMap(n=>fam(n));const pool=COLORS.filter(c=>!ef.includes(c.name));return pool.length?pool[Math.floor(Math.random()*pool.length)]:COLORS.filter(c=>!ex.includes(c.name))[0];}
function cmatch(r,n){return[...(CF[n]||[n]),n].some(f=>r.toLowerCase().includes(f));}
function tc(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(0.299*r+0.587*g+0.114*b)/255>0.55?'#1A1714':'#FFFFFF';}
function shuffle(a){const arr=[...a];for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
const FRAC_NAMES=['half','third','fourth','fifth'];
const FRAC_DENOMS=[2,3,4,5];
function fracName(n){return FRAC_NAMES[n-2]||`${n}th`;}

// ═══════════════════════════════════════════════════════════════════════════════
// BAR RENDERERS — shared across all lessons
// ═══════════════════════════════════════════════════════════════════════════════
const BH=62, BASE=320;

function sbar(hex,name,w,isUnk=false){
  const col=tc(hex);
  const c=isUnk?`<span style="font-family:'DM Serif Display',serif;font-size:24px;font-style:italic;color:${col}">?</span>`
    :`<span class="bar-label" style="color:${col}">${name}</span>`;
  return `<div class="bar-h" style="width:${w}px;background:${hex}">${c}</div>`;
}

function renderEqual(m){
  if(m.layout==='dotted'){const w=m.w1;return`<div style="position:relative;display:inline-block;padding:0 20px"><div style="position:absolute;left:16px;top:0;bottom:0;border-left:2px dashed #9B9591"></div><div style="position:absolute;right:16px;top:0;bottom:0;border-right:2px dashed #9B9591"></div><div style="margin-bottom:8px">${sbar(m.c1.hex,m.c1.name,w,m.unk===m.c1.name)}</div>${sbar(m.c2.hex,m.c2.name,w,m.unk===m.c2.name)}</div>`;}
  return`<div style="display:flex;flex-direction:column;align-items:flex-start;gap:8px">${sbar(m.c1.hex,m.c1.name,m.w1,m.unk===m.c1.name)}${sbar(m.c2.hex,m.c2.name,m.w2,m.unk===m.c2.name)}</div>`;
}

function renderPW(m){
  const{whole,p1,p2}=m;
  const wB=sbar(whole.color.hex,whole.color.name,whole.w,m.unknownRole==='whole');
  const p1B=sbar(p1.color.hex,p1.color.name,p1.w,m.unknownRole==='p1');
  const p2B=sbar(p2.color.hex,p2.color.name,p2.w,m.unknownRole==='p2');
  const lines=`<div style="position:absolute;left:0;top:0;bottom:0;border-left:2px dashed #9B9591"></div><div style="position:absolute;right:0;top:0;bottom:0;border-right:2px dashed #9B9591"></div>`;
  return`<div style="position:relative;display:inline-block">${lines}<div style="display:flex;flex-direction:column;align-items:flex-start;gap:8px">${wB}<div style="display:flex">${p1B}${p2B}</div></div></div>`;
}

function renderComparison(m){
  const{larger,smaller,diff}=m;
  const lB=sbar(larger.color.hex,larger.color.name,larger.w,m.unknownRole==='larger');
  const sB=sbar(smaller.color.hex,smaller.color.name,smaller.w,m.unknownRole==='smaller');
  const dPale=diff?`<div style="width:${diff.w}px;height:${BH}px;background:${diff.color.hex}44;border:2px dashed #9B9591;border-radius:0 6px 6px 0;display:flex;align-items:center;justify-content:center;flex-shrink:0">${m.unknownRole==='diff'?`<span style="font-family:'DM Serif Display',serif;font-size:22px;font-style:italic;color:#777">?</span>`:`<span style="font-size:11px;font-weight:600;color:#777;text-transform:capitalize">${diff.color.name}</span>`}</div>`:'';
  const lines=diff?`<div style="position:absolute;left:${smaller.w}px;top:0;bottom:0;border-left:2px dashed #6B6560"></div><div style="position:absolute;left:${larger.w}px;top:0;bottom:0;border-left:2px dashed #6B6560"></div>`:'';
  return`<div style="position:relative;display:inline-block">${lines}<div style="display:flex;flex-direction:column;align-items:flex-start;gap:8px">${lB}<div style="display:flex">${sB}${dPale}</div></div></div>`;
}

function renderFractional(m){
  const{wholeColor,partColor,denominator,filledIndex,unknownRole,wholeW}=m;
  const boxW=wholeW/denominator;
  const wBar=sbar(wholeColor.hex,wholeColor.name,wholeW,unknownRole==='whole');
  let boxes='';
  for(let i=0;i<denominator;i++){
    const iF=i===filledIndex,isUnk=iF&&unknownRole==='part';
    const bg=iF?partColor.hex:partColor.hex+'33',bdr=iF?'none':'2px dashed #9B9591',col=iF?tc(partColor.hex):'#9B9591';
    const c=isUnk?`<span style="font-family:'DM Serif Display',serif;font-size:22px;font-style:italic;color:${col}">?</span>`:iF?`<span style="font-size:11px;font-weight:600;text-transform:capitalize;color:${col}">${partColor.name}</span>`:' ';
    boxes+=`<div style="width:${boxW}px;height:${BH}px;background:${bg};border:${bdr};${i===0?'border-radius:6px 0 0 6px;':''}${i===denominator-1?'border-radius:0 6px 6px 0;':''}display:flex;align-items:center;justify-content:center;flex-shrink:0">${c}</div>`;
  }
  let lines='';
  for(let i=1;i<denominator;i++) lines+=`<div style="position:absolute;left:${i*boxW}px;top:0;bottom:0;border-left:2px dashed #9B9591;pointer-events:none"></div>`;
  lines+=`<div style="position:absolute;left:0;top:0;bottom:0;border-left:2px dashed #9B9591;pointer-events:none"></div>`;
  lines+=`<div style="position:absolute;left:${wholeW}px;top:0;bottom:0;border-left:2px dashed #9B9591;pointer-events:none"></div>`;
  return`<div style="position:relative;display:inline-block">${lines}<div style="display:flex;flex-direction:column;align-items:flex-start;gap:8px">${wBar}<div style="display:flex">${boxes}</div></div></div>`;
}

// ═══════════════════════════════════════════════════════════════════════════════
// WORD BANK BUILDER — for instruction phase button responses
// Generates correct + distractor buttons from accepted answers and color pool
// Always at least 2 options, max 4, shuffled
// ═══════════════════════════════════════════════════════════════════════════════
function buildInstructWB(acc, distractors, onSelect) {
  // acc: array of accepted answer strings (first one is canonical)
  // distractors: array of plausible wrong answers
  const correct = acc[0];
  const opts = shuffle([correct, ...distractors.filter(d=>d!==correct)]).slice(0, 4);
  // Ensure correct is always present
  if (!opts.includes(correct)) { opts[opts.length-1] = correct; shuffle(opts); }
  const btns = opts.map(o =>
    `<button class="wb-btn" onclick="${onSelect}('${o.replace(/'/g,"\\'")}')">${o}</button>`
  ).join('');
  return `<div class="instruct-word-bank"><div class="wb-group">${btns}</div></div>`;
}

// ═══════════════════════════════════════════════════════════════════════════════
// RELATION STRIP — for naming phases
// ═══════════════════════════════════════════════════════════════════════════════
function strip(asm, subFn, backFn) {
  const toks = asm.length
    ? asm.map(t=>`<span class="r-token${t==='unknown'?' unk':''}">${t}</span>`).join('')
    : `<span class="strip-ph">Tap buttons to build the relation...</span>`;
  return `<div class="relation-strip">${toks}</div>
    <div class="strip-row">
      <button class="btn-back" onclick="${backFn}()">← Back</button>
      <button class="btn-submit" onclick="${subFn}()" ${asm.length<2?'disabled':''}>Submit</button>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════════════
const S = {
  phase:'intro',
  reviewStep:0, instructStep:0, identStep:0, namingStep:0, freeStep:0,
  instructFU:false, instructM:null,
  currentModel:null, currentAnswer:null, currentNaming:null,
  scaffoldColorActive:true, scaffoldColorStreak:0, scaffoldColorLocked:false,
  scaffoldRoleActive:true, scaffoldRoleStreak:0, scaffoldRoleLocked:false,
  freeModel:null, freeRelationsFound:[], freeTarget:4,
  totalReview:4, totalIdent:12, totalNaming:8, totalFree:3,

// Show instruction step — text animates, then question appears, then buttons appear
function showInstruct(step) {
  S.instructStep = step; S.instructFU = false;
  if (step >= INSTRUCT.length) { afterInstruct(); return; }
  setProgress(22 + (step / INSTRUCT.length) * 20);

  const def = INSTRUCT[step];
  S.instructM = def.build ? def.build() : null;
  const m = S.instructM;

  const audio = def.audio(m);
  const question = typeof def.question === 'function' ? def.question(m) : def.question;
  const acc = typeof def.acc === 'function' ? def.acc(m) : def.acc;
  const distractors = buildDistractors(acc, m, def);

  const modelHtml = m ? `<div class="canvas">${renderModel(m)}</div>` : '';

  render(
    `${modelHtml}
     <div class="instruct-text" id="instructBox">
       ${audioBtn()}
       <span id="instructAnim" class="typed-text"></span>
     </div>
     <div class="question-prompt" id="questionBox" style="display:none">${question}</div>`,
    `<div id="instructBtns" style="display:none"></div>`
  );

  speak(audio);

  // Animate text, then show question and buttons
  animateText(audio, 'instructAnim', () => {
    const qBox = document.getElementById('questionBox');
    const bBox = document.getElementById('instructBtns');
    if (qBox) qBox.style.display = 'block';
    if (bBox) {
      bBox.style.display = 'block';
      bBox.innerHTML = buildInstructWB(acc, distractors, 'submitInstruct');
    }
  });
}

function submitInstruct(chosen) {
  const def = INSTRUCT[S.instructStep];
  const m = S.instructM;
  const question = typeof def.question === 'function' ? def.question(m) : def.question;
  const acc = typeof def.acc === 'function' ? def.acc(m) : def.acc;

  if (!S.instructFU) {
    const ok = acc.some(a => chosen.toLowerCase().includes(a.toLowerCase()) || a.toLowerCase().includes(chosen.toLowerCase()));
    if (ok) {
      S.instructFU = true;
      // Show follow-up
      const fuAudio = def.fu(m);
      const fuQ = typeof def.fuQ === 'function' ? def.fuQ(m) : def.fuQ;
      const fuAcc = typeof def.fuAcc === 'function' ? def.fuAcc(m) : def.fuAcc;
      const fuDistractors = buildDistractors(fuAcc, m, def, true);
      const modelHtml = m ? `<div class="canvas">${renderModel(m)}</div>` : '';
      render(
        `${modelHtml}
         <div class="instruct-text bridge" id="instructBox">
           ${audioBtn()}
           <span id="instructAnim" class="typed-text"></span>
         </div>
         <div class="question-prompt" id="questionBox" style="display:none">${fuQ}</div>`,
        `<div id="instructBtns" style="display:none"></div>`
      );
      speak(fuAudio);
      animateText(fuAudio, 'instructAnim', () => {
        const qBox = document.getElementById('questionBox');
        const bBox = document.getElementById('instructBtns');
        if (qBox) qBox.style.display = 'block';
        if (bBox) {
          bBox.style.display = 'block';
          bBox.innerHTML = buildInstructWB(fuAcc, fuDistractors, 'submitInstruct');
        }
      });
    } else {
      // Error correction — show corrective text, re-ask
      const cor = typeof def.cor === 'function' ? def.cor(m) : def.cor;
      const distractors = buildDistractors(acc, m, def);
      const modelHtml = m ? `<div class="canvas">${renderModel(m)}</div>` : '';
      render(
        `${modelHtml}
         <div class="instruct-text correction" id="instructBox">
           ${audioBtn()}
           <span id="instructAnim" class="typed-text"></span>
         </div>
         <div class="question-prompt" id="questionBox" style="display:none">${question}</div>`,
        `<div id="instructBtns" style="display:none"></div>`
      );
      speak(cor);
      animateText(cor, 'instructAnim', () => {
        const qBox = document.getElementById('questionBox');
        const bBox = document.getElementById('instructBtns');
        if (qBox) qBox.style.display = 'block';
        if (bBox) {
          bBox.style.display = 'block';
          bBox.innerHTML = buildInstructWB(acc, distractors, 'submitInstruct');
        }
      });
    }
  } else {
    // Follow-up response
    const fuAcc = typeof def.fuAcc === 'function' ? def.fuAcc(m) : def.fuAcc;
    const fuQ = typeof def.fuQ === 'function' ? def.fuQ(m) : def.fuQ;
    const ok = fuAcc.some(a => chosen.toLowerCase().includes(a.toLowerCase()) || a.toLowerCase().includes(chosen.toLowerCase()));
    if (ok) {
      showInstruct(S.instructStep + 1);
    } else {
      const fuCor = typeof def.fuCor === 'function' ? def.fuCor(m) : def.fuCor;
      const fuDistractors = buildDistractors(fuAcc, m, def, true);
      const modelHtml = m ? `<div class="canvas">${renderModel(m)}</div>` : '';
      render(
        `${modelHtml}
         <div class="instruct-text correction" id="instructBox">
           ${audioBtn()}
           <span id="instructAnim" class="typed-text"></span>
         </div>
         <div class="question-prompt" id="questionBox" style="display:none">${fuQ}</div>`,
        `<div id="instructBtns" style="display:none"></div>`
      );
      speak(fuCor);
      animateText(fuCor, 'instructAnim', () => {
        const qBox = document.getElementById('questionBox');
        const bBox = document.getElementById('instructBtns');
        if (qBox) qBox.style.display = 'block';
        if (bBox) {
          bBox.style.display = 'block';
          bBox.innerHTML = buildInstructWB(fuAcc, fuDistractors, 'submitInstruct');
        }
      });
    }
  }
}

// Build plausible distractors from the same conceptual pool
function buildDistractors(acc, m, def, isFU=false) {
  const correct = acc[0];
  const pool = [];

  // Color distractors — pick wrong colors from COLORS
  const colorNames = COLORS.map(c=>c.name);
  if (colorNames.some(c => acc.some(a => a.includes(c)))) {
    const usedColors = colorNames.filter(c => acc.some(a => a.includes(c)));
    const otherColors = colorNames.filter(c => !usedColors.includes(c));
    shuffle(otherColors).slice(0,2).forEach(c => pool.push(c));
  }

  // Relation word distractors
  const relWords = ['equal','not equal','plus','minus','part-whole','comparison','difference','halves','thirds','fourths','fifths','times','fraction'];
  relWords.filter(w => !acc.some(a=>a.includes(w))).slice(0,3).forEach(w=>pool.push(w));

  // Yes/no if acc includes yes/no
  if (acc.some(a=>a==='yes')) pool.push('no');
  if (acc.some(a=>a==='no')) pool.push('yes');

  // Fraction distractors
  if (acc.some(a=>FRAC_NAMES.includes(a))) {
    FRAC_NAMES.filter(f=>!acc.includes(f)).forEach(f=>pool.push(f));
  }

  // Number distractors
  ['two','three','four','five'].filter(n=>!acc.some(a=>a.includes(n))).slice(0,2).forEach(n=>pool.push(n));

  return shuffle(pool.filter(d=>d&&d!==correct)).slice(0,3);
}

function saveSession() {
  try {
    const corrects = S.sessionData.filter(d=>d.correct).length;
    const errors   = S.sessionData.filter(d=>!d.correct).length;
    const record = { date:new Date().toISOString(), lesson:CFG.id, phase:'instruction', corrects, errors, cpm:0, epm:0, duration:null };
    const raw = localStorage.getItem(CFG.storageKey);
    const existing = raw ? JSON.parse(raw) : [];
    existing.push(record);
    localStorage.setItem(CFG.storageKey, JSON.stringify(existing));
  } catch(e) {}
}

function genEqReview(){
  const c1=randColor(),c2=randColor([c1.name]);
  const w=BASE*(0.5+Math.random()*0.4);
  const isEqual=Math.random()>0.4;
  const layout=isEqual&&Math.random()>0.5?'dotted':'stacked';
  const w2=isEqual?w:w*(0.6+Math.random()*0.5);
  return{c1,c2,w1:w,w2,isEqual,layout};
}
function genPW(unknownRole=null){
  const wC=randColor(),p1C=randColor([wC.name]),p2C=randColor([wC.name,p1C.name]);
  const tw=BASE*(0.6+Math.random()*0.3),sp=0.35+Math.random()*0.3;
  const role=unknownRole||['whole','p1','p2'][Math.floor(Math.random()*3)];
  const whole={color:wC,w:tw},p1={color:p1C,w:tw*sp},p2={color:p2C,w:tw*(1-sp)};
  return{whole,p1,p2,unknownRole:role,confirmed:true};
}
function genNE(){
  const c1=randColor(),c2=randColor([c1.name]),c3=randColor([c1.name,c2.name]);
  const w=BASE*(0.6+Math.random()*0.3),sp=0.35+Math.random()*0.3;
  const types=['solo','two_no_whole','size_compare','parts_dont_sum'];
  const nonType=types[Math.floor(Math.random()*types.length)];
  return{c1,c2,c3,w,sp,nonType,isNE:true};
}

function renderNE(m){
  const{c1,c2,c3,w,sp,nonType}=m;
  if(nonType==='solo') return sbar(c1.hex,c1.name,w);
  if(nonType==='two_no_whole') return`<div style="display:flex;flex-direction:column;gap:8px">${sbar(c1.hex,c1.name,w*sp)}${sbar(c2.hex,c2.name,w*(1-sp))}</div>`;
  if(nonType==='size_compare') return`<div style="display:flex;flex-direction:column;gap:8px">${sbar(c1.hex,c1.name,w)}${sbar(c2.hex,c2.name,w*0.6)}</div>`;
  // parts_dont_sum
  return`<div style="position:relative;display:inline-block"><div style="display:flex;flex-direction:column;gap:8px">${sbar(c1.hex,c1.name,w)}
    <div style="display:flex">${sbar(c2.hex,c2.name,w*sp*0.9)}${sbar(c3.hex,c3.name,w*(1-sp)*0.75)}</div></div></div>`;
}

function renderModel(m){
  if(m.isNE) return renderNE(m);
  if(m.c1&&!m.whole) return renderEqual(m);
  return renderPW(m);
}

const INSTRUCT=[
  {
    build(){return genPW();},
    audio(m){return`Look at this picture. The ${m.whole.color.name} bar is on top. The ${m.p1.color.name} and ${m.p2.color.name} bars are on the bottom. Together, the bottom two bars equal the top bar. That is called a Part-Whole relation. The top bar is the whole. The two bottom bars are the parts. What color is the whole?`;},
    question(m){return`What color is the whole?`;},
    acc(m){return[m.whole.color.name,...fam(m.whole.color.name)];},
    cor(m){return`The whole is the single bar that equals both parts together. What color is the top bar?`;},
    fu(m){return`Right — ${m.whole.color.name} is the whole. Now, what colors are the parts?`;},
    fuQ(m){return`What colors are the two parts?`;},
    fuAcc(m){return[m.p1.color.name,m.p2.color.name,`${m.p1.color.name} and ${m.p2.color.name}`,`${m.p2.color.name} and ${m.p1.color.name}`];},
    fuCor(m){return`The parts are the two smaller bars that together equal the whole. What colors are they?`;},
  },
  {
    build(){const m=genPW();m.fadedPart='p1';return m;},
    audio(m){return`The ${m.p1.color.name} part is faded — imagine it is taken away. What is left of the whole after the ${m.p1.color.name} part is removed?`;},
    question(m){return`If the ${m.p1.color.name} part is removed, what remains?`;},
    acc(m){return[m.p2.color.name,...fam(m.p2.color.name)];},
    cor(m){return`Look at the part that is not faded. What color is it?`;},
    fu(m){return`Right — ${m.p2.color.name}. So: ${m.whole.color.name} without ${m.p1.color.name} equals ${m.p2.color.name}. When we take away a part from the whole, we subtract.`;},
    fuQ(m){return`What word do we use when we take away?`;},
    fuAcc(){return['minus','subtract','take away','without'];},
    fuCor(){return`When we take away a part from the whole, we subtract. We say: whole minus part. What word means take away?`;},
  },
  {
    build(){return genPW(null);},
    audio(m){return`When the unknown is the whole, we add the parts: ${m.p1.color.name} plus ${m.p2.color.name} equals the whole. When the unknown is a part, we subtract: whole minus known part equals unknown. Which operation finds the whole?`;},
    question(m){return`Which operation finds the whole?`;},
    acc:['plus','addition','add'],
    cor:`To find the whole, we add the parts together. Which operation is that?`,
    fu(m){return`Right — plus. And which operation finds a missing part?`;},
    fuQ(m){return`Which operation finds a missing part?`;},
    fuAcc:['minus','subtraction','subtract'],
    fuCor:`To find a missing part, we subtract from the whole. Which operation is that?`,
  },
];

function startReview(){S.phase='review';setPhase('Review — Equal');S.reviewStep=0;nextReview();}
function nextReview(){
  if(S.reviewStep>=S.totalReview){showInstructIntro();return;}
  setProgress(4+(S.reviewStep/S.totalReview)*14);
  S.currentModel=genEqReview();startTimer();
  render(`<div class="canvas">${renderEqual(S.currentModel)}</div><div class="question-prompt">Equal or Not Equal?</div>`,

  const audio=S.currentModel.isEqual?`Look — does the picture confirm these are the same size?`:`Look at the sizes — are they the same?`;

function nextNaming(){

  setProgress(70+(S.namingStep/S.totalNaming)*26);
  const roles=['whole','p1','p2'];
  const role=roles[S.namingStep%3];
  const m=genPW(role);
  S.currentModel=m;S.currentNaming={whole:m.whole.color.name,p1:m.p1.color.name,p2:m.p2.color.name,unknownRole:role};
  startTimer();
  if(!S.scaffoldColorLocked&&S.scaffoldColorActive) showColorScaffold();
  else if(!S.scaffoldRoleLocked&&S.scaffoldRoleActive) showRoleScaffold();
  else showNamingItem();
}
function showColorScaffold(){
  const n=S.currentNaming;
  const unk=n.unknownRole==='whole'?n.whole:n.unknownRole==='p1'?n.p1:n.p2;
  const opts=shuffle([...COLORS.map(c=>c.name).filter(c=>c!==unk).slice(0,3),unk]);
  render(`<div class="canvas">${renderPW(S.currentModel)}</div><div class="question-prompt">What color is the unknown?</div>`,
    `<div class="response-buttons">${opts.map(o=>`<button class="btn" onclick="submitColorScaffold('${o}')">${o}</button>`).join('')}</div>`);
  speak('What color is the unknown?');

function submitColorScaffold(r){
  const n=S.currentNaming;
  const unk=n.unknownRole==='whole'?n.whole:n.unknownRole==='p1'?n.p1:n.p2;
  const ok=cmatch(r,unk);
  updateColorScaffold(ok);recordResp('scaffold_color',ok);
  if(ok){if(!S.scaffoldRoleLocked&&S.scaffoldRoleActive)showRoleScaffold();else showNamingItem();}
  else{
    const audio=`Look for the shape with the question mark. What color is it?`;
    render(`<div class="canvas">${renderPW(S.currentModel)}</div>
      <div class="instruct-text correction">${audioBtn()}<span id="instructAnim" class="typed-text"></span></div>`,
      `<div class="response-buttons">${shuffle([...COLORS.map(c=>c.name).filter(c=>c!==unk).slice(0,3),unk]).map(o=>`<button class="btn" onclick="submitColorScaffold('${o}')">${o}</button>`).join('')}</div>`);
    speak(audio);animateText(audio,'instructAnim');
  }
}
function showRoleScaffold(){
  const n=S.currentNaming;
  const unk=n.unknownRole==='whole'?n.whole:n.unknownRole==='p1'?n.p1:n.p2;
  render(`<div class="canvas">${renderPW(S.currentModel)}</div><div class="question-prompt">Is the ${unk} bar the whole or a part?</div>`,
    `<div class="response-buttons"><button class="btn" onclick="submitRoleScaffold('whole')">The Whole</button><button class="btn" onclick="submitRoleScaffold('part')">A Part</button></div>`);
  speak(`Is the ${unk} bar the whole or a part?`);
}
function submitRoleScaffold(r){
  const n=S.currentNaming;
  const ok=(r==='whole'&&n.unknownRole==='whole')||(r==='part'&&n.unknownRole!=='whole');
  updateRoleScaffold(ok);recordResp('scaffold_role',ok);
  if(ok){showNamingItem();return;}
  const isW=n.unknownRole==='whole';
  const unk=isW?n.whole:n.unknownRole==='p1'?n.p1:n.p2;
  const audio=isW?`The ${unk} bar equals both others together — it is the whole.`:`The ${unk} bar is one of the smaller bars — it is a part.`;
  render(`<div class="canvas">${renderPW(S.currentModel)}</div>
    <div class="instruct-text correction">${audioBtn()}<span id="instructAnim" class="typed-text"></span></div>`,
    `<div class="response-buttons"><button class="btn" onclick="submitRoleScaffold('whole')">The Whole</button><button class="btn" onclick="submitRoleScaffold('part')">A Part</button></div>`);
  speak(audio);animateText(audio,'instructAnim');
}
function showNamingItem(){
  const n=S.currentNaming;
  const{whole,p1,p2,unknownRole}=n;
  const kp=unknownRole==='p1'?p2:p1;
  const relOpts=unknownRole==='whole'
    ?shuffle([`${p1} plus ${p2} equals unknown`,`${p1} minus ${p2} equals unknown`,`${p2} plus ${whole} equals unknown`])
    :shuffle([`${whole} minus ${kp} equals unknown`,`${whole} plus ${kp} equals unknown`,`${kp} minus ${whole} equals unknown`]);
  const correct=unknownRole==='whole'?`${p1} plus ${p2} equals unknown`:`${whole} minus ${kp} equals unknown`;
  const opts=shuffle([...new Set([correct,...relOpts])]).slice(0,3);
  if(!opts.includes(correct))opts[opts.length-1]=correct;
  render(`<div class="canvas">${renderPW(S.currentModel)}</div><div class="question-prompt">What equals the unknown?</div>`,
    `<div class="response-buttons">${shuffle(opts).map(o=>`<button class="btn" onclick="submitNaming('${o.replace(/'/g,"&#39;")}')">${o}</button>`).join('')}</div>`);
  speak('What equals the unknown?');
}
function submitNaming(r){
  const n=S.currentNaming;
  const{whole,p1,p2,unknownRole}=n;
  const kp=unknownRole==='p1'?p2:p1;
  const isCorrect=unknownRole==='whole'
    ?(cmatch(r,p1)&&cmatch(r,p2)&&(r.includes('plus')||r.includes('and')))
    :(cmatch(r,whole)&&cmatch(r,kp)&&(r.includes('minus')||r.includes('without')));
  recordResp('naming',isCorrect);updateColorScaffold(isCorrect);updateRoleScaffold(isCorrect);
  if(isCorrect){S.namingStep++;nextNaming();return;}
  let audio=unknownRole==='whole'
    ?`Add the parts to find the whole. Say: ${p1} plus ${p2} equals unknown.`
    :`Subtract the known part from the whole. Say: ${whole} minus ${kp} equals unknown.`;
  const kp2=unknownRole==='p1'?p2:p1;
  const correct=unknownRole==='whole'?`${p1} plus ${p2} equals unknown`:`${whole} minus ${kp2} equals unknown`;
  render(`<div class="canvas">${renderPW(S.currentModel)}</div>
    <div class="instruct-text correction">${audioBtn()}<span id="instructAnim" class="typed-text"></span></div>`,
    `<div class="response-buttons">${shuffle([correct,unknownRole==='whole'?`${p1} minus ${p2} equals unknown`:`${whole} plus ${kp2} equals unknown`,`${kp2} minus ${whole} equals unknown`]).slice(0,3).map(o=>`<button class="btn" onclick="submitNaming('${o.replace(/'/g,"&#39;")}')">${o}</button>`).join('')}</div>`);
  speak(audio);animateText(audio,'instructAnim');
}


// ── Init ──────────────────────────────────────────────────────────────────────
if (window.speechSynthesis) { window.speechSynthesis.onvoiceschanged=()=>{}; window.speechSynthesis.getVoices(); }
document.getElementById('ttsToggle').classList.add('on');
showIntro();
</script>
