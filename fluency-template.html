<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluency — %%LABEL%%</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root{--bg:#F7F4EF;--surface:#FFFFFF;--border:#E2DDD6;--text-primary:#1A1714;--text-secondary:#6B6560;--text-muted:#9B9591;--accent:#2D6A4F;--accent-light:#EAF4EF;--accent-warm:#C17D3C;--accent-warm-light:#FBF0E4;--error:#C0392B;--radius:12px;--radius-lg:20px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
  .app{width:100%;max-width:780px;display:flex;flex-direction:column;gap:14px;}
  .header{display:flex;align-items:center;gap:12px;}
  .lesson-label{font-family:'DM Serif Display',serif;font-size:24px;letter-spacing:-0.5px;}
  .phase-label{font-size:12px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;flex:1;}
  .drill-layout{display:flex;gap:12px;align-items:stretch;}
  .model-area{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px 24px;display:flex;align-items:center;justify-content:center;min-height:170px;overflow:visible;}
  .word-bank{width:132px;flex-shrink:0;border:2px solid var(--text-primary);border-radius:var(--radius);padding:8px 7px;display:flex;flex-direction:column;gap:5px;background:var(--surface);}
  .wb-group{display:flex;flex-direction:column;gap:3px;}
  .wb-row{display:flex;gap:3px;}
  .wb-div{height:1px;background:var(--border);margin:3px 0;}
  .word-btn{width:100%;padding:6px 4px;border-radius:7px;border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--text-primary);cursor:pointer;transition:all 0.1s;text-align:center;}
  .word-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
  .word-btn:active{transform:scale(0.95);}
  .word-btn-half{flex:1;padding:6px 2px;border-radius:7px;border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;color:var(--text-primary);cursor:pointer;transition:all 0.1s;text-align:center;}
  .word-btn-half:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
  .word-btn-half:active{transform:scale(0.95);}
  .relation-strip{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;min-height:44px;}
  .token{background:var(--accent-light);border:1px solid #B8DAC8;border-radius:5px;padding:3px 9px;font-size:13px;font-weight:600;color:var(--accent);}
  .token.unk{background:#F0EAF8;border-color:#C9B8E8;color:#6C3483;}
  .strip-ph{font-size:13px;color:var(--text-muted);font-style:italic;}
  .strip-row{display:flex;gap:8px;align-items:center;}
  .btn-back{padding:7px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--text-secondary);cursor:pointer;}
  .btn-back:hover{border-color:var(--accent-warm);color:var(--accent-warm);}
  .btn-sub{padding:7px 16px;border-radius:var(--radius);border:none;background:var(--accent);color:white;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
  .btn-sub:hover{background:#255C43;}
  .btn-sub:disabled{opacity:0.35;pointer-events:none;}
  .timer-ring{position:relative;width:56px;height:56px;flex-shrink:0;}
  .timer-ring svg{transform:rotate(-90deg);}
  .timer-ring .bg{fill:none;stroke:var(--border);stroke-width:5;}
  .timer-ring .fg{fill:none;stroke:var(--accent);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke 0.3s;}
  .timer-ring .fg.urgent{stroke:var(--error);}
  .timer-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:17px;}
  .results-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px 32px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,0.04);}
  .results-card h2{font-family:'DM Serif Display',serif;font-size:24px;color:var(--accent);margin-bottom:16px;}
  .rate-row{display:flex;gap:20px;justify-content:center;margin-bottom:16px;}
  .rate-stat{text-align:center;}
  .rate-num{font-family:'DM Serif Display',serif;font-size:44px;}
  .rate-num.c{color:var(--accent);}
  .rate-num.e{color:var(--error);}
  .rate-sub{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
  .feedback-card{background:var(--accent-warm-light);border:1px solid #E8C99A;border-radius:var(--radius);padding:14px 18px;font-size:14px;line-height:1.6;margin-bottom:10px;}
  .feedback-card.ok{background:var(--accent-light);border-color:#B8DAC8;}
  .btn-continue{width:100%;padding:13px;border-radius:var(--radius);border:none;background:var(--accent);color:white;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;}
  .btn-continue:hover{background:#255C43;}
  .nav-links{display:flex;gap:8px;margin-top:8px;}
  .nav-link{flex:1;padding:11px;border-radius:var(--radius);border:2px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--text-primary);text-decoration:none;text-align:center;display:block;}
  .nav-link:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
  .nav-link.primary{background:var(--accent);border-color:var(--accent);color:white;}
  .intro-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px 32px;}
  .intro-card h2{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:10px;}
  .intro-card p{font-size:14px;line-height:1.6;color:var(--text-secondary);margin-bottom:6px;}
  .start-btn{width:100%;padding:14px;border-radius:var(--radius);border:none;background:var(--accent);color:white;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;cursor:pointer;margin-top:14px;}
  .start-btn:hover{background:#255C43;}
  .bar-h{height:58px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
  .fu{animation:fadeUp 0.2s ease;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="lesson-label">%%LABEL%% — Fluency</span>
    <span class="phase-label" id="phaseLabel">Practice</span>
  </div>
  <div id="main"></div>
</div>
<script>
// ── Config ────────────────────────────────────────────────────────────────────
const CFG={id:%%ID%%,storageKey:'%%STORAGE_KEY%%',lessonType:'%%LESSON_TYPE%%',chartHref:'%%CHART_HREF%%',lessonHref:'%%LESSON_HREF%%'};

// ── Storage ───────────────────────────────────────────────────────────────────
function loadSessions(){try{const r=localStorage.getItem(CFG.storageKey);return r?JSON.parse(r):[];}catch(e){return[];}}
function saveSession(s){try{const e=loadSessions();e.push(s);localStorage.setItem(CFG.storageKey,JSON.stringify(e));}catch(e){}}

// ── Colors ────────────────────────────────────────────────────────────────────
const COLORS=[{name:'blue',hex:'#1B6CA8'},{name:'orange',hex:'#D4600A'},{name:'green',hex:'#2D6A4F'},{name:'red',hex:'#C0392B'},{name:'purple',hex:'#6C3483'},{name:'teal',hex:'#0E7E7E'},{name:'pink',hex:'#B03A6E'},{name:'navy',hex:'#1A3A5C'}];
const CF={blue:['blue','navy','teal'],navy:['navy','blue'],teal:['teal','blue','green'],green:['green','teal'],red:['red','pink'],pink:['pink','red'],orange:['orange'],purple:['purple']};
function fam(n){const f=CF[n]||[n];return COLORS.filter(c=>f.includes(c.name)||(CF[c.name]||[c.name]).includes(n)).map(c=>c.name);}
function randColor(ex=[]){const ef=ex.flatMap(n=>fam(n));const pool=COLORS.filter(c=>!ef.includes(c.name));return pool.length?pool[Math.floor(Math.random()*pool.length)]:COLORS.filter(c=>!ex.includes(c.name))[0];}
function tc(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(0.299*r+0.587*g+0.114*b)/255>0.55?'#1A1714':'#FFFFFF';}
const BH=58,BASE=280;
function sbar(hex,name,w,isUnk=false){const col=tc(hex);const c=isUnk?`<span style="font-family:'DM Serif Display',serif;font-size:20px;font-style:italic;color:${col}">?</span>`:`<span style="font-size:11px;font-weight:600;text-transform:capitalize;color:${col}">${name}</span>`;return`<div class="bar-h" style="width:${w}px;background:${hex}">${c}</div>`;}

// ── Render ────────────────────────────────────────────────────────────────────
function renderItem(m){
  if(m.layout==='dotted')return`<div style="position:relative;display:inline-block;padding:0 16px"><div style="position:absolute;left:12px;top:0;bottom:0;border-left:2px dashed #9B9591"></div><div style="position:absolute;right:12px;top:0;bottom:0;border-right:2px dashed #9B9591"></div><div style="margin-bottom:7px">${sbar(m.c1.hex,m.c1.name,m.w,m.unk===m.c1.name)}</div>${sbar(m.c2.hex,m.c2.name,m.w,m.unk===m.c2.name)}</div>`;
  return`<div style="display:flex;flex-direction:column;align-items:flex-start;gap:7px">${sbar(m.c1.hex,m.c1.name,m.w1,m.unk===m.c1.name)}${sbar(m.c2.hex,m.c2.name,m.w2,m.unk===m.c2.name)}</div>`;
}

// ── Generator ─────────────────────────────────────────────────────────────────
function genItem(){
  const c1=randColor(),c2=randColor([c1.name]);
  const w=BASE*(0.55+Math.random()*0.35);
  const unk=Math.random()>0.5?c1.name:c2.name;
  const kn=unk===c1.name?c2.name:c1.name;
  const layout=Math.random()>0.5?'stacked':'dotted';
  return{c1,c2,w1:w,w2:w,w,unk,kn,layout,colors:[c1,c2],correct:[kn,'equals','unknown']};
}

// ── Word bank ─────────────────────────────────────────────────────────────────
function wb(item,onAdd){
  const cb=item.colors.map(c=>`<button class="word-btn" onclick="${onAdd}('${c.name}')">${c.name}</button>`).join('');
  return`<div class="word-bank">
    <div class="wb-group">${cb}</div>
    <div class="wb-div"></div>
    <div class="wb-group">
      <div class="wb-row">
        <button class="word-btn" onclick="${onAdd}('equals')">equals</button>
        <button class="word-btn" onclick="${onAdd}('unknown')">unknown</button>
      </div>
    </div>
  </div>`;
}

// ── Strip ─────────────────────────────────────────────────────────────────────
function strip(assembled,subFn,backFn){
  const toks=assembled.length?assembled.map(t=>`<span class="token${t==='unknown'?' unk':''}">${t}</span>`).join(''):`<span class="strip-ph">Tap buttons to build the relation...</span>`;
  return`<div class="relation-strip fu">${toks}</div><div class="strip-row"><button class="btn-back" onclick="${backFn}()">← Back</button><button class="btn-sub" onclick="${subFn}()" ${assembled.length<2?'disabled':''}>Submit</button></div>`;
}

// ── Check ─────────────────────────────────────────────────────────────────────
function check(tokens,item){
  const s=tokens.join(' ');
  const cor=item.correct.join(' ');
  if(s===cor)return{ok:true,fb:null};
  const qi=tokens.indexOf('unknown');
  if(qi>=0&&qi<tokens.length-1)return{ok:false,fb:`That's true — but put the unknown at the end. The unknown is what you're solving for.`};
  if(tokens[0]===item.unk)return{ok:false,fb:`Start with the known shape — the one without the question mark. Say: ${item.kn} equals unknown`};
  if(!tokens.includes('equals'))return{ok:false,fb:`Include 'equals' in the relation. Say: ${item.kn} equals unknown`};
  return{ok:false,fb:`Name the relation: ${item.kn} equals unknown`};
}

// ── Timer ─────────────────────────────────────────────────────────────────────
const DUR=30,CIRC=2*Math.PI*24;
function tRing(t){const off=CIRC*(1-t/DUR);return`<div class="timer-ring"><svg width="56" height="56" viewBox="0 0 56 56"><circle class="bg" cx="28" cy="28" r="24"/><circle class="fg${t<=8?' urgent':''}" cx="28" cy="28" r="24" stroke-dasharray="${CIRC.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/></svg><div class="timer-label">${t}</div></div>`;}

// ── State ─────────────────────────────────────────────────────────────────────
const S={phase:'intro',t:DUR,timer:null,cor:0,err:0,item:null,asm:[],start:null,errors:[],ci:0,cItem:null,cAsm:[],cFb:null};
function render(h){document.getElementById('main').innerHTML=h;}
function setPhase(l){document.getElementById('phaseLabel').textContent=l;}

// ── Drill ─────────────────────────────────────────────────────────────────────
function showIntro(){S.phase='intro';setPhase('Practice');render(`<div class="intro-card fu"><h2>%%LABEL%% — Fluency</h2><p>You will see bar models for <strong>30 seconds</strong>.</p><p>Build the relation using the word buttons on the right. The unknown goes at the end.</p><p style="color:var(--accent);font-weight:600">Go as fast as you accurately can.</p><button class="start-btn" onclick="startDrill()">Start</button></div>`);}

function startDrill(){S.phase='drill';S.cor=0;S.err=0;S.t=DUR;S.start=new Date().toISOString();S.errors=[];setPhase('Practice');nextItem();S.timer=setInterval(()=>{S.t--;updateT();if(S.t<=0)endDrill();},1000);}

function nextItem(){S.item=genItem();S.asm=[];draw();}

function draw(){
  render(`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">${tRing(S.t)}</div>
    <div class="drill-layout fu"><div class="model-area">${renderItem(S.item)}</div>${wb(S.item,'addT')}</div>
    ${strip(S.asm,'sub','back')}`);
}

function updateT(){const r=document.querySelector('.timer-ring');if(!r)return;const off=CIRC*(1-S.t/DUR);const fg=r.querySelector('.fg');const lb=r.querySelector('.timer-label');if(fg){fg.setAttribute('stroke-dashoffset',off.toFixed(1));if(S.t<=8)fg.classList.add('urgent');}if(lb)lb.textContent=S.t;}

function addT(w){S.asm.push(w);draw();}
function back(){S.asm.pop();draw();}

function sub(){
  if(S.phase!=='drill')return;
  const{ok,fb}=check(S.asm,S.item);
  if(ok){S.cor++;}else{S.err++;S.errors.push({item:S.item,fb});}
  nextItem();
}

function endDrill(){
  clearInterval(S.timer);S.phase='results';setPhase('Results');
  const cpm=S.cor*2,epm=S.err*2;
  saveSession({date:S.start,lesson:CFG.id,phase:'fluency',corrects:S.cor,errors:S.err,cpm,epm,duration:DUR});
  render(`<div class="results-card fu"><h2>Session Complete</h2>
    <div class="rate-row"><div class="rate-stat"><div class="rate-num c">${cpm}</div><div class="rate-sub">Correct / min</div></div><div style="font-size:26px;color:var(--text-muted);padding-top:10px">/</div><div class="rate-stat"><div class="rate-num e">${epm}</div><div class="rate-sub">Errors / min</div></div></div>
    <p style="color:var(--text-secondary);font-size:14px;margin-bottom:${S.errors.length?'16px':'0'}">${S.cor} correct and ${S.err} error${S.err!==1?'s':''} in 30 seconds.</p>
    ${S.errors.length?`<button class="btn-continue" onclick="startCorrections()">Review ${S.errors.length} missed item${S.errors.length!==1?'s':''} →</button>`
    :`<div class="nav-links"><a class="nav-link" href="${CFG.lessonHref}">Back to Lesson</a><a class="nav-link primary" href="${CFG.chartHref}">View Chart</a><a class="nav-link" onclick="location.reload()">Again</a></div>`}
  </div>`);
}

// ── Corrections ───────────────────────────────────────────────────────────────
function startCorrections(){S.phase='correction';S.ci=0;setPhase('Review');showC();}

function showC(){
  if(S.ci>=S.errors.length){doneC();return;}
  const e=S.errors[S.ci];S.cItem=e.item;S.cAsm=[];S.cFb=e.fb;drawC();
}

function drawC(){
  render(`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:13px;font-weight:600;color:var(--text-secondary)">Missed item ${S.ci+1} of ${S.errors.length}</span><span style="font-size:12px;color:var(--text-muted)">${S.errors.length-S.ci} remaining</span></div>
    <div class="feedback-card">${S.cFb}</div>
    <div class="drill-layout fu"><div class="model-area">${renderItem(S.cItem)}</div>${wb(S.cItem,'addC')}</div>
    ${strip(S.cAsm,'subC','backC')}`);
}

function addC(w){S.cAsm.push(w);drawC();}
function backC(){S.cAsm.pop();drawC();}

function subC(){
  const{ok,fb}=check(S.cAsm,S.cItem);
  if(ok){
    const rem=S.errors.length-S.ci-1;
    render(`<div class="feedback-card ok fu">✓ Correct — ${S.cItem.correct.join(' ')}</div>
      <div class="drill-layout"><div class="model-area">${renderItem(S.cItem)}</div>${wb(S.cItem,'addC')}</div>
      <button class="btn-continue" style="margin-top:10px" onclick="nextC()">${rem>0?'Next missed item →':'Finish review'}</button>`);
  } else {
    S.cFb=fb;S.cAsm=[];drawC();
  }
}

function nextC(){S.ci++;showC();}
function doneC(){setPhase('Complete');render(`<div class="results-card fu"><h2>Review Complete</h2><p style="color:var(--text-secondary);font-size:14px;margin-bottom:16px">You worked through all ${S.errors.length} missed item${S.errors.length!==1?'s':''}.</p><div class="nav-links"><a class="nav-link" onclick="location.reload()">Practice Again</a><a class="nav-link primary" href="${CFG.chartHref}">View Chart</a><a class="nav-link" href="${CFG.lessonHref}">Back to Lesson</a></div></div>`);}

showIntro();
</script>
</body>
</html>
